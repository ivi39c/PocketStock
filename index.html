<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <style>
    :root {
      --bg-main: #ffffff;
      --text-main: #000000;
      --text-muted: #8e8e93;
      --text-dim: #636366;
      --border-thin: #e5e5ea;
      --accent-orange: #ff9500;
      --accent-red: #ff3b30;
      --bg-input: #f2f2f7;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg-main); 
      color: var(--text-main); 
      padding: 0;
      margin: 0;
      overflow: hidden;
    }
    
    .container { 
      width: 100%; 
      max-width: 420px; 
      margin: 0 auto; 
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .sticky-top-panel {
      position: sticky;
      top: 0;
      background: var(--bg-main);
      z-index: 100;
      padding: 16px 16px 12px 16px;
      border-bottom: 1px solid #f2f2f7;
    }

    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    header h1 { font-size: 19px; font-weight: 700; margin: 0; color: var(--text-main); letter-spacing: -0.5px; }
    
    .header-ops-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-ops { display: flex; gap: 5px; align-items: center; }
    
    .btn-base {
      height: 30px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-update { background: #f2f2f7; color: var(--text-main); }
    .btn-add { background: #1c1c1e; color: #ffffff; }
    .btn-edit { background: #f2f2f7; color: var(--text-main); }
    .btn-edit.active { background: var(--accent-red); color: #ffffff; }
    .btn-copy { background: #e5e5ea; color: var(--text-dim); }
    
    .refresh-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      color: var(--text-muted);
    }

    .time-text { font-size: 11px; color: #8e8e93; font-weight: 400; }

    .form-card { 
      background: #fbfbfa; 
      padding: 16px; 
      border-radius: 8px; 
      border: 1px solid var(--border-thin);
      margin-top: 12px;
      display: none; 
    }
    .card-title { font-size: 12px; font-weight: 700; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-close-form { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-muted); font-weight: 500; }
    .form-control { width: 100%; height: 38px; padding: 0 10px; background: var(--bg-input); border: 1px solid var(--border-thin); border-radius: 6px; font-size: 14px; color: var(--text-main); box-sizing: border-box; }
    .form-control:focus { outline: none; border-color: #aeaea3; }
    
    select.form-control { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238e8e93' d='M0 0l5 5 5-5z'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 30px; }

    .form-checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
    .form-checkbox-group label { margin: 0; color: var(--text-dim); font-size: 13px; cursor: pointer; }
    .form-box-check { width: 18px; height: 18px; border: 1px solid #d1d1d6; border-radius: 4px; position: relative; cursor: pointer; }
    .form-box-check.checked { background-color: #1c1c1e; border-color: #1c1c1e; }
    .form-box-check.checked::after { content: ''; position: absolute; width: 4px; height: 8px; border: solid white; border-width: 0 2px 2px 0; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); }

    .btn-submit { width: 100%; height: 40px; background: #1c1c1e; color: #ffffff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }

    .scroll-content {
      flex-grow: 1;
      overflow-y: auto;
      padding: 0 16px 40px 16px;
      -webkit-overflow-scrolling: touch; 
    }

    .category-block { margin-bottom: 24px; }
    .category-header { padding: 12px 4px 8px 4px; font-size: 14px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-thin); }
    .category-header.need-to-buy-header { color: var(--accent-red); font-weight: 700; }
    
    .item-row { padding: 12px 4px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f7; min-height: 54px; }
    
    .item-info-zone { display: flex; flex-direction: column; gap: 2px; flex-grow: 1; overflow: hidden; padding-right: 8px; }
    .item-name { font-size: 15px; font-weight: 400; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-name.is-empty { opacity: 0.3; }
    .item-expiry-text { font-size: 11px; color: var(--text-muted); }
    
    .right-meta { display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; gap: 6px; }
    
    .qty-display { font-size: 13px; font-weight: 600; color: var(--text-dim); padding: 4px 10px; background: #f2f2f7; border-radius: 6px; cursor: pointer; }
    .qty-display.highlight-orange { color: #ffffff; background: var(--accent-orange); }
    .qty-display.is-buy-active { color: #ffffff; background: var(--accent-orange); }

    .inline-qty-input { width: 55px; height: 30px; background: #f4f4f6; border: 1px solid var(--border-thin); border-radius: 4px; text-align: center; font-size: 13px; color: var(--text-main); padding: 0; }
    .inline-qty-input:focus { outline: none; border-color: var(--text-muted); background: #ffffff; }

    .inline-expiry-input { width: 90px; height: 30px; background: #f4f4f6; border: 1px solid var(--border-thin); border-radius: 4px; font-size: 11px; color: var(--text-main); text-align: center; padding: 0 2px; }
    .inline-expiry-input:focus { outline: none; border-color: var(--text-muted); background: #ffffff; }

    .inline-checkbox { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #d1d1d6; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; background: transparent; flex-shrink: 0; }
    .inline-checkbox.checked { background: #1c1c1e; border-color: #1c1c1e; }
    .inline-checkbox.checked::after { content: ''; position: absolute; width: 4px; height: 8px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); top: 3px; }

    .btn-inline-delete { background: #ffebeb; border: none; color: var(--accent-red); padding: 0 8px; height: 30px; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
    
    .status-text { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px; }
  </style>
</head>
<body>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <h1 id="pageMainTitle">6/17 盤點表</h1>
      
      <div class="header-ops-wrapper">
        <div class="header-ops">
          <button class="btn-base btn-add" id="toggleAddBtn" onclick="openAddForm()">+ Add</button>
          <button class="btn-base btn-edit" id="toggleEditBtn" onclick="toggleEditMode()">Edit</button>
          <button class="btn-base btn-copy" onclick="copyToClipboard()">Copy</button>
          
          <button class="refresh-icon-btn" onclick="fetchInventory()" title="重新整理">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
            </svg>
          </button>
        </div>
        <span class="time-text" id="lastUpdateTime"></span>
      </div>
    </header>

    <div class="form-card" id="formCard">
      <div class="card-title">
        <span>新增品項</span>
        <button class="btn-close-form" onclick="closeForm()">✕</button>
      </div>
      <div class="form-group">
        <label>項目名稱</label>
        <input type="text" id="itemName" class="form-control" placeholder="例：雞蛋">
      </div>
      <div class="form-group">
        <label>數量單位</label>
        <input type="text" id="itemQty" class="form-control" placeholder="例：0、2顆">
      </div>
      <div class="form-group">
        <label>有效期限 (選填)</label>
        <input type="date" id="itemExpiry" class="form-control">
      </div>
      <div class="form-checkbox-group">
        <div class="form-box-check" id="formBuyCheck" onclick="this.classList.toggle('checked')"></div>
        <label onclick="document.getElementById('formBuyCheck').classList.toggle('checked')">標記為下次必買</label>
      </div>
      <div class="form-group">
        <label>分類</label>
        <select id="itemCategory" class="form-control">
          <option value="">載入選單中...</option>
        </select>
      </div>
      <button type="button" id="btnSubmit" class="btn-submit" onclick="saveNewItem()">確認新增</button>
    </div>
  </div>

  <div class="scroll-content">
    <div id="statusInfo" class="status-text">Loading...</div>
    <div id="inventoryList"></div>
  </div>
</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec"; 
  
  let globalData = [];
  let globalCategories = []; 
  let isEditModeActive = false;

  function checkIsMustBuy(qtyStr) {
    return String(qtyStr).includes("(必買)");
  }

  function getCleanQty(qtyStr) {
    return String(qtyStr).replace("(必買)", "").trim();
  }

  document.addEventListener("DOMContentLoaded", () => {
    updateTitleDate();
    fetchInventory();
  });

  function updateTitleDate() {
    const now = new Date();
    document.getElementById("pageMainTitle").innerText = `${now.getMonth() + 1}/${now.getDate()} 盤點表`;
  }

  function getTitleText() {
    const now = new Date();
    return `${now.getMonth() + 1}/${now.getDate()} 盤點表`;
  }

  function renderCategoryDropdown(categories) {
    const select = document.getElementById("itemCategory");
    select.innerHTML = '<option value="">請選擇分類...</option>';
    
    if (categories && categories.length > 0) {
      categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.innerText = cat;
        select.appendChild(opt);
      });
    } else {
      const defaults = ["櫃子檯面", "櫃子左一", "第一層(調味料/香料區)", "第二層(粉類)", "第三層(茶葉類)", "冷藏", "冷凍"];
      defaults.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.innerText = cat;
        select.appendChild(opt);
      });
    }
  }

  function updateTimestampDisplay() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById("lastUpdateTime").innerText = `${now.getMonth() + 1}/${now.getDate()} ${hours}:${minutes}`;
  }

  function fetchInventory() {
    const status = document.getElementById("statusInfo");
    status.style.display = "block";
    status.innerText = "Loading data...";
    document.getElementById("inventoryList").innerHTML = "";

    fetch(GAS_WEB_APP_URL)
      .then(res => res.json())
      .then(res => {
        status.style.display = "none";
        if (res.status === "success") {
          globalData = res.data;
          globalCategories = res.categories || [];
          
          renderCategoryDropdown(globalCategories);
          renderList(globalData);
          updateTimestampDisplay();
          updateTitleDate();
        } else {
          status.innerText = "Error loading data.";
        }
      })
      .catch(err => {
        status.innerText = "Connection failed.";
      });
  }

  function renderList(items) {
    const list = document.getElementById("inventoryList");
    list.innerHTML = ""; 

    if (!items || items.length === 0) {
      list.innerHTML = '<div class="status-text">清單目前是空的。</div>';
      return;
    }

    const needToBuyItems = [];
    const normalGroups = {};

    // 初始化分組
    globalCategories.forEach(cat => {
      normalGroups[cat] = [];
    });

    items.forEach(item => {
      const rawQty = item['庫存量'] || '';
      if (checkIsMustBuy(rawQty)) {
        needToBuyItems.push(item);
      } else {
        const cat = item['分類'] || "未分類";
        if (!normalGroups[cat]) normalGroups[cat] = [];
        normalGroups[cat].push(item);
      }
    });

    // 1. ⚠️ 下次要買區
    if (needToBuyItems.length > 0) {
      const buyBlock = document.createElement("div");
      buyBlock.className = "category-block";
      
      const buyHeader = document.createElement("div");
      buyHeader.className = "category-header need-to-buy-header";
      buyHeader.innerText = "⚠️ 下次要買";
      buyBlock.appendChild(buyHeader);

      needToBuyItems.forEach(item => {
        buyBlock.appendChild(createItemRow(item, true));
      });
      list.appendChild(buyBlock);
    }

    // 2. 依照【選單列表】順序進行正常分類區渲染
    const sortedCategories = globalCategories.length > 0 ? globalCategories : Object.keys(normalGroups);
    
    sortedCategories.forEach(category => {
      if (normalGroups[category] && normalGroups[category].length > 0) {
        renderCategoryGroup(category, normalGroups[category], list);
        delete normalGroups[category];
      }
    });

    // 補遺剩餘的未分類項目
    for (const category in normalGroups) {
      if (normalGroups[category] && normalGroups[category].length > 0) {
        renderCategoryGroup(category, normalGroups[category], list);
      }
    }
  }

  function renderCategoryGroup(category, groupItems, parentList) {
    const catBlock = document.createElement("div");
    catBlock.className = "category-block";
    
    const catHeader = document.createElement("div");
    catHeader.className = "category-header";
    catHeader.innerText = category;
    catBlock.appendChild(catHeader);

    groupItems.forEach(item => {
      catBlock.appendChild(createItemRow(item, false));
    });

    parentList.appendChild(catBlock);
  }

  function formatExpiryShow(dateStr) {
    if (!dateStr) return "";
    try {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    } catch(e) {
      return dateStr;
    }
  }

  function formatToInputDate(dateStr) {
    if (!dateStr) return "";
    try {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return "";
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    } catch(e) {
      return "";
    }
  }

  function createItemRow(item, isChecked) {
    const itemRow = document.createElement("div");
    itemRow.className = "item-row";
    
    const cleanQty = getCleanQty(item['庫存量']);
    const isZero = (cleanQty === "0" || cleanQty === "");

    const infoZone = document.createElement("div");
    infoZone.className = "item-info-zone";

    const nameDiv = document.createElement("div");
    nameDiv.className = `item-name ${isZero ? 'is-empty' : ''}`;
    nameDiv.innerText = item['名稱'] || '未命名';
    infoZone.appendChild(nameDiv);

    const expiryStr = item['有效期限'] || '';
    if (expiryStr && expiryStr.trim() !== "") {
      const expDiv = document.createElement("div");
      expDiv.className = "item-expiry-text";
      expDiv.innerText = `效期：${formatExpiryShow(expiryStr)}`;
      infoZone.appendChild(expDiv);
    }
    itemRow.appendChild(infoZone);

    const rightMeta = document.createElement("div");
    rightMeta.className = "right-meta";

    if (!isEditModeActive) {
      const badge = document.createElement("span");
      // ✨ 修正亮橘色邏輯：如果是必買區或者是庫存為0，就給予醒目的亮色
      badge.className = "qty-display" + (isChecked ? " is-buy-active" : isZero ? " highlight-orange" : "");
      
      // ✨ 修正按鈕內文字顯示：如果是必買項目，則顯示成 0 (必買) 的完整可讀樣式
      badge.innerText = isChecked ? `${cleanQty} (必買)` : item['庫存量']; 
      badge.onclick = () => toggleQuickBuy(item['ID'], isChecked);
      rightMeta.appendChild(badge);
    } else {
      const inlineCheck = document.createElement("div");
      inlineCheck.className = "inline-checkbox" + (isChecked ? " checked" : "");
      inlineCheck.onclick = () => {
        inlineCheck.classList.toggle("checked");
        submitInlineUpdate(item, inlineCheck.classList.contains("checked"), null, null);
      };
      rightMeta.appendChild(inlineCheck);

      const inlineInput = document.createElement("input");
      inlineInput.type = "text";
      inlineInput.className = "inline-qty-input";
      inlineInput.value = cleanQty;
      inlineInput.onblur = () => {
        if (inlineInput.value.trim() !== cleanQty) {
          submitInlineUpdate(item, isChecked, inlineInput.value.trim(), null);
        }
      };
      inlineInput.onkeydown = (e) => {
        if (e.key === "Enter") inlineInput.blur();
      };
      rightMeta.appendChild(inlineInput);

      const inlineExpInput = document.createElement("input");
      inlineExpInput.type = "date";
      inlineExpInput.className = "inline-expiry-input";
      inlineExpInput.value = formatToInputDate(item['有效期限']);
      inlineExpInput.onchange = () => {
        submitInlineUpdate(item, isChecked, null, inlineExpInput.value);
      };
      rightMeta.appendChild(inlineExpInput);

      const inlineDelBtn = document.createElement("button");
      inlineDelBtn.className = "btn-inline-delete";
      inlineDelBtn.innerText = "刪除";
      inlineDelBtn.onclick = () => deleteItem(item['ID'], item['名稱']);
      rightMeta.appendChild(inlineDelBtn);
    }

    itemRow.appendChild(rightMeta);
    return itemRow;
  }

  function submitInlineUpdate(item, isMustBuyActive, newQtyValue, newExpiryValue) {
    document.getElementById("statusInfo").style.display = "block";
    document.getElementById("statusInfo").innerText = "Saving changes...";

    let finalQty = newQtyValue !== null ? newQtyValue : getCleanQty(item['庫存量']);
    if (isMustBuyActive) {
      // 確保不會重複疊加 (必買) 欄位
      finalQty = `${finalQty} (必買)`;
    }
    
    let finalExpiry = newExpiryValue !== null ? newExpiryValue : (item['有效期限'] || "");

    const payload = {
      action: "save",
      data: { 
        id: item['ID'], 
        name: item['名稱'], 
        qty: finalQty, 
        category: item['分類'], 
        expiry: finalExpiry
      }
    };

    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(res => {
      if (res.status === "success") {
        fetchInventory();
      }
    })
    .catch(err => alert("修正儲存失敗"));
  }

  function toggleQuickBuy(id, currentChecked) {
    const targetItem = globalData.find(item => String(item['ID']) === String(id));
    if (!targetItem) return;
    submitInlineUpdate(targetItem, !currentChecked, null, null);
  }

  function toggleEditMode() {
    isEditModeActive = !isEditModeActive;
    const btn = document.getElementById("toggleEditBtn");
    if (isEditModeActive) {
      btn.innerText = "✕ 關閉";
      btn.classList.add("active");
      document.getElementById("formCard").style.display = "none";
    } else {
      btn.innerText = "Edit";
      btn.classList.remove("active");
    }
    renderList(globalData); 
  }

  function openAddForm() {
    clearForm();
    const card = document.getElementById("formCard");
    
    if (card.style.display === "block") {
      card.style.display = "none";
    } else {
      card.style.display = "block";
      if (isEditModeActive) {
        isEditModeActive = false;
        const btn = document.getElementById("toggleEditBtn");
        btn.innerText = "Edit";
        btn.classList.remove("active");
      }
      renderList(globalData);
    }
  }

  function closeForm() {
    document.getElementById("formCard").style.display = "none";
    clearForm();
  }

  function saveNewItem() {
    const name = document.getElementById("itemName").value.trim();
    let qty = document.getElementById("itemQty").value.trim();
    const expiry = document.getElementById("itemExpiry").value;
    const isChecked = document.getElementById("formBuyCheck").classList.contains("checked");
    const category = document.getElementById("itemCategory").value.trim();

    if (!name || qty === "" || !category) {
      alert("請填寫名稱、數量與分類。");
      return;
    }

    if (isChecked) qty = `${qty} (必買)`;

    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.innerText = "新增中...";

    const payload = {
      action: "save",
      data: { id: "", name: name, qty: qty, category: category, expiry: expiry }
    };

    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(res => {
      btn.disabled = false;
      btn.innerText = "確認新增";
      if (res.status === "success") {
        closeForm();
        fetchInventory();
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "確認新增";
    });
  }

  function deleteItem(id, name) {
    if (!confirm(`確認刪除「${name}」？`)) return;
    document.getElementById("statusInfo").style.display = "block";
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "delete", data: { id: id } })
    })
    .then(res => res.json())
    .then(res => { if (res.status === "success") fetchInventory(); })
    .catch(err => alert("刪除失敗"));
  }

  function copyToClipboard() {
    if (globalData.length === 0) return;

    let finalOutput = `${getTitleText()}\n\n`;
    let needToBuyText = `⚠️ 下次要買：\n`;
    let hasStockText = ``;
    let hasNeedToBuy = false;
    const normalGroups = {};

    globalData.forEach(item => {
      const rawQty = item['庫存量'] || '';
      if (checkIsMustBuy(rawQty)) {
        needToBuyText += `${item['名稱']} ${getCleanQty(rawQty)}\n`;
        hasNeedToBuy = true;
      } else {
        const cat = item['分類'] || "未分類";
        if (!normalGroups[cat]) normalGroups[cat] = [];
        normalGroups[cat].push(item);
      }
    });

    const sortedCategories = globalCategories.length > 0 ? globalCategories : Object.keys(normalGroups);
    
    sortedCategories.forEach(category => {
      if (normalGroups[category]) {
        let categoryContent = ``;
        normalGroups[category].forEach(item => {
          categoryContent += `${item['名稱']} ${item['庫存量']}\n`;
        });
        if (categoryContent !== ``) {
          hasStockText += `🔹 ${category}：\n${categoryContent}\n`;
        }
      }
    });

    if (hasNeedToBuy) {
      finalOutput += needToBuyText + `\n`;
    }
    finalOutput += hasStockText;
    finalOutput = finalOutput.trim();

    const textarea = document.createElement("textarea");
    textarea.value = finalOutput;
    textarea.style.position = "fixed";
    document.body.appendChild(textarea);
    textarea.select();

    try {
      document.execCommand("copy");
      alert(`📋 已複製 ${getTitleText()} 盤點表！`);
    } catch (err) {}
    document.body.removeChild(textarea);
  }

  function clearForm() {
    document.getElementById("itemName").value = "";
    document.getElementById("itemQty").value = "";
    document.getElementById("itemExpiry").value = "";
    document.getElementById("formBuyCheck").classList.remove("checked");
    document.getElementById("itemCategory").value = "";
  }
</script>
</body>
</html>
