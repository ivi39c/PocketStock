<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PocketStock 庫存</title>

  <!-- 字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- Google 登入 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ========== 登入畫面 ========== -->
  <section id="login-screen">
    <div class="brand">PocketStock<span class="dot">.</span></div>
    <p class="tagline">手機友善的庫存盤點工具。請用 Google 帳號登入後開始。</p>
    <div id="google-btn"></div>
  </section>

  <!-- ========== 主程式 ========== -->
  <main id="app-screen">

    <header class="topbar">
      <div class="title">PocketStock<span class="dot">.</span></div>
      <button id="btn-refresh" class="btn btn-ghost btn-sm" data-lock>重新整理</button>
    </header>

    <!-- 新增 -->
    <section class="card">
      <h2>新增項目</h2>
      <div class="form-grid">
        <label class="field full">名稱
          <input type="text" id="f-name" placeholder="例如：雞蛋" autocomplete="off">
        </label>
        <label class="field">數量
          <input type="text" id="f-qty" class="num" placeholder="例如：2顆 / 0" autocomplete="off">
        </label>
        <label class="field">分類
          <input type="text" id="f-category" list="category-options" placeholder="選擇或輸入" autocomplete="off">
        </label>
        <label class="field full">有效日期（可不填）
          <input type="date" id="f-expiry" class="num">
        </label>
      </div>
      <div style="margin-top:12px; display:flex; justify-content:flex-end;">
        <button id="btn-create" class="btn btn-primary" data-lock>新增</button>
      </div>
    </section>

    <!-- 清單 -->
    <section class="card">
      <div class="list-head">
        <h2 style="margin:0;">庫存清單</h2>
        <label class="select-all-wrap">
          <input type="checkbox" id="select-all"> 全選
        </label>
      </div>

      <div class="table">
        <div id="item-rows"></div>
        <div id="empty-hint">目前沒有庫存項目，從上面新增一筆吧。</div>
      </div>
    </section>

  </main>

  <!-- 批量操作浮列 -->
  <div id="batch-bar">
    <span class="count">已選 <b id="batch-count">0</b> 筆</span>
    <span class="spacer"></span>
    <button id="btn-clear-sel" class="btn btn-ghost btn-sm" data-lock>取消選取</button>
    <button id="btn-update" class="btn btn-primary btn-sm" data-lock>更新所選</button>
    <button id="btn-delete" class="btn btn-danger btn-sm" data-lock>刪除所選</button>
  </div>

  <!-- 載入遮罩 / toast -->
  <div id="loading"><div class="spinner"></div></div>
  <div id="toast" class="toast"></div>

  <!-- 分類下拉來源 -->
  <datalist id="category-options"></datalist>

  <!-- 三層腳本（順序很重要：設定 → API → 狀態 → 畫面）-->
  <script src="config.js"></script>
  <script src="api-client.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
