<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock // Studio</title>
  <style>
    :root {
      --bg-main: #000000;
      --bg-card: #111111;
      --bg-input: #1a1a1a;
      --text-main: #ffffff;
      --text-muted: #888888;
      --accent-blue: #0071e3; /* Apple Blue */
      --accent-gold: #e6b450;
      --accent-green: #2ecc71;
      --accent-danger: #ff3b30;
      --border-color: #2c2c2e;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-main); 
      color: var(--text-main); 
      padding: 24px 16px; 
      margin: 0;
      letter-spacing: -0.02em;
    }
    
    .container { max-width: 480px; margin: 0 auto; }
    
    /* 頂部極簡導航 */
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }
    header h1 { 
      font-size: 20px; 
      font-weight: 600; 
      margin: 0; 
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: "SF Pro Display", sans-serif;
    }
    .header-ops { display: flex; gap: 8px; }
    
    /* Tesla/Apple 風格俐落按鈕 */
    .btn-action { 
      height: 34px; 
      padding: 0 14px; 
      font-size: 13px; 
      font-weight: 500; 
      border-radius: 6px; 
      border: 1px solid var(--border-color); 
      cursor: pointer; 
      background: var(--bg-card);
      color: var(--text-main);
      transition: all 0.2s ease;
    }
    .btn-action:active { background: #222; transform: scale(0.97); }
    .btn-add-mode { background: var(--text-main); color: var(--bg-main); border: none; font-weight: 600; }
    .btn-edit-mode.active { background: var(--accent-danger); color: white; border: none; }
    .btn-refresh { width: 34px; padding: 0; }

    /* 頂級滿版複製按鈕 */
    .btn-share { 
      width: 100%; 
      height: 50px; 
      border: none; 
      border-radius: 8px; 
      font-size: 14px; 
      font-weight: 600; 
      cursor: pointer; 
      color: white; 
      background: linear-gradient(135deg, #1f1f1f, #111111);
      border: 1px solid var(--border-color);
      margin-bottom: 28px; 
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
    }
    .btn-share:active { background: #1a1a1a; border-color: #444; }

    /* 隱藏/彈出式暗黑面板 */
    .form-card { 
      background: var(--bg-card); 
      padding: 20px; 
      border-radius: 12px; 
      border: 1px solid var(--border-color);
      margin-bottom: 24px; 
      display: none; 
    }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
    .btn-close-form { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-muted); }
    
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); }
    .form-control { width: 100%; height: 42px; padding: 0 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; color: white; box-sizing: border-box; }
    .form-control:focus { outline: none; border-color: #666; }
    .btn-submit { width: 100%; height: 44px; background: var(--accent-blue); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

    /* 現代層級感清單 (分類大卡片) */
    .list-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    
    .category-block {
      background: var(--bg-card);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .category-header {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(to right, #151517, #111111);
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
      display: flex;
      align-items: center;
    }
    
    /* 品項明細對齊列 */
    .item-row { 
      padding: 12px 16px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #1c1c1e;
    }
    .item-row:last-child { border-bottom: none; }
    .item-name { font-size: 15px; font-weight: 400; color: #e5e5e7; }
    .item-qty { font-size: 15px; font-weight: 500; color: var(--text-main); font-family: "SF Pro Text", monospace; }
    
    /* 修改/刪除按鈕動態列 */
    .edit-actions { display: none; gap: 8px; align-items: center; }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 4px; font-weight: 500; color: white; border: none; cursor: pointer; }
    .btn-click-edit { background: #2c2c2e; border: 1px solid #444; }
    .btn-delete { background: rgba(255, 59, 48, 0.15); color: var(--accent-danger); border: 1px solid rgba(255, 59, 48, 0.3); }
    
    .status-text { text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px; font-weight: 400; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>PocketStock //</h1>
    <div class="header-ops">
      <button class="btn-action btn-add-mode" onclick="openAddForm()">➕ 新增</button>
      <button class="btn-action btn-edit-mode" id="toggleEditBtn" onclick="toggleEditMode()">✏️ 編輯模式</button>
      <button class="btn-action btn-refresh" onclick="fetchInventory()">🔄</button>
    </div>
  </header>

  <button class="btn-share" onclick="copyToClipboard()">📄 複製當前庫存文字 (指定段落格式)</button>

  <div class="form-card" id="formCard">
    <div class="card-title">
      <span id="form-title">Console // 新增品項</span>
      <button class="btn-close-form" onclick="closeForm()">✕</button>
    </div>
    <input type="hidden" id="itemId">
    <div class="form-group">
      <label>項目名稱</label>
      <input type="text" id="itemName" class="form-control" placeholder="例：雞蛋">
    </div>
    <div class="form-group">
      <label>數量單位</label>
      <input type="text" id="itemQty" class="form-control" placeholder="例：2顆、3包、0">
    </div>
    <div class="form-group">
      <label>分類</label>
      <input type="text" id="itemCategory" class="form-control" placeholder="例：冷藏、乾貨">
    </div>
    <div class="form-group">
      <label>有效期限</label>
      <input type="date" id="itemExpiry" class="form-control">
    </div>
    <button type="button" id="btnSubmit" class="btn-submit" onclick="saveItem()">EXECUTE SYSTEM UPDATE</button>
  </div>

  <div>
    <div class="list-title">Live Inventory // 目前清單</div>
    <div id="statusInfo" class="status-text">CONNECTING TO SERVER...</div>
    <div id="inventoryList"></div>
  </div>
</div>

<script>
  // ⚠️ 請記得換上你最新部署得到的 GAS Web App URL
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec"; // 請換成你實際的 URL
  
  let globalData = [];
  let isEditModeActive = false;

  document.addEventListener("DOMContentLoaded", fetchInventory);

  function fetchInventory() {
    const status = document.getElementById("statusInfo");
    status.style.display = "block";
    status.innerText = "FETCHING DATA FROM CLOUD...";
    document.getElementById("inventoryList").innerHTML = "";

    fetch(GAS_WEB_APP_URL)
      .then(res => res.json())
      .then(res => {
        status.style.display = "none";
        if (res.status === "success") {
          globalData = res.data;
          renderList(globalData);
        } else {
          status.innerText = "ERROR: " + res.message;
        }
      })
      .catch(err => {
        status.innerText = "CONNECTION FAILED. CHECK NETWORK.";
      });
  }

  // 🎯 核心邏輯修改：依照分類進行大卡片分組渲染 (分類 > 品項 + 數量)
  function renderList(items) {
    const list = document.getElementById("inventoryList");
    if (items.length === 0) {
      list.innerHTML = '<div class="status-text">// INVENTORY EMPTY. READY FOR INPUT.</div>';
      return;
    }

    // 1. 建立分類群組
    const groups = {};
    items.forEach(item => {
      const cat = item['分類'] || "未分類";
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    });

    // 2. 依分類繪製外殼與內容
    for (const category in groups) {
      const catBlock = document.createElement("div");
      catBlock.className = "category-block";
      
      // 分類大標題
      const catHeader = document.createElement("div");
      catHeader.className = "category-header";
      catHeader.innerText = `🔷 ${category}`;
      catBlock.appendChild(catHeader);

      // 分類底下的所有品項列
      groups[category].forEach(item => {
        const itemRow = document.createElement("div");
        itemRow.className = "item-row";
        itemRow.innerHTML = `
          <div class="item-name">${item['名稱'] || '未命名'}</div>
          
          <div class="qty-display" id="qty-display-${item['ID']}">
            <span class="item-qty">${item['庫存量']}</span>
          </div>
          
          <div class="edit-actions" id="edit-actions-${item['ID']}" style="display: ${isEditModeActive ? 'flex' : 'none'}">
            <button class="btn-sm btn-click-edit" onclick="startEditItem('${item['ID']}', '${item['名稱']}', '${item['庫存量']}', '${item['分類']}', '${item['有效期限']}')">EDIT</button>
            <button class="btn-sm btn-delete" onclick="deleteItem('${item['ID']}', '${item['名稱']}')">DEL</button>
          </div>
        `;
        catBlock.appendChild(itemRow);
      });

      list.appendChild(catBlock);
    }
  }

  function toggleEditMode() {
    isEditModeActive = !isEditModeActive;
    const btn = document.getElementById("toggleEditBtn");
    
    if (isEditModeActive) {
      btn.innerText = "✕ CLOSE";
      btn.classList.add("active");
    } else {
      btn.innerText = "✏️ 編輯模式";
      btn.classList.remove("active");
    }
    // 重新渲染，流暢切換視圖
    renderList(globalData);
  }

  function openAddForm() {
    clearForm();
    document.getElementById("form-title").innerText = "Console // 新增品項";
    document.getElementById("formCard").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function startEditItem(id, name, qty, category, expiry) {
    document.getElementById("itemId").value = id;
    document.getElementById("itemName").value = name;
    document.getElementById("itemQty").value = qty;
    document.getElementById("itemCategory").value = category;
    document.getElementById("itemExpiry").value = expiry === "undefined" || expiry === "null" ? "" : expiry;
    
    document.getElementById("form-title").innerText = "Console // 變更編號: " + id;
    document.getElementById("formCard").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closeForm() {
    document.getElementById("formCard").style.display = "none";
    clearForm();
  }

  function saveItem() {
    const id = document.getElementById("itemId").value.trim();
    const name = document.getElementById("itemName").value.trim();
    const qty = document.getElementById("itemQty").value.trim();
    const category = document.getElementById("itemCategory").value.trim();
    const expiry = document.getElementById("itemExpiry").value;

    if (!name || !qty || !category) {
      alert("請完整輸入所有系統欄位。");
      return;
    }

    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.innerText = "SYNCING TO CLOUD...";

    const payload = {
      action: "save",
      data: { id: id, name: name, qty: qty, category: category, expiry: expiry }
    };

    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(res => {
      btn.disabled = false;
      btn.innerText = "EXECUTE SYSTEM UPDATE";
      if (res.status === "success") {
        closeForm();
        if (isEditModeActive) toggleEditMode();
        fetchInventory();
      } else {
        alert("UPDATE FAILED: " + res.message);
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "EXECUTE SYSTEM UPDATE";
      alert("NETWORK TIMEOUT.");
    });
  }

  function deleteItem(id, name) {
    if (!confirm(`系統確認：徹底銷毀「${name}」的存檔？`)) return;
    
    document.getElementById("statusInfo").style.display = "block";
    document.getElementById("statusInfo").innerText = "DELETING DATA FROM SERVER...";

    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "delete", data: { id: id } })
    })
    .then(res => res.json())
    .then(res => { 
      if (res.status === "success") {
        fetchInventory(); 
      } else {
        alert("DELETE FAILED: " + res.message);
      }
    })
    .catch(err => alert("SERVER CONNECTION LOST."));
  }

  function copyToClipboard() {
    if (globalData.length === 0) {
      alert("無現存資料可進行導出。");
      return;
    }

    let needToBuyText = `⚠️下次要買\n`;
    let hasStockText = ``;
    let hasNeedToBuy = false;
    const groups = {};

    globalData.forEach(item => {
      const cat = item['分類'] || "未分類";
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    });

    for (const category in groups) {
      let categoryContent = ``;
      groups[category].forEach(item => {
        const qtyStr = String(item['庫存量']).trim();
        if (qtyStr === "0" || qtyStr.startsWith("0")) {
          needToBuyText += `${item['名稱']}\n`;
          hasNeedToBuy = true;
        } else {
          categoryContent += `${item['名稱']} ${item['庫存量']}\n`;
        }
      });
      if (categoryContent !== ``) {
        hasStockText += `🔷${category}\n${categoryContent}\n`;
      }
    }

    let finalOutput = ``;
    if (hasNeedToBuy) finalOutput += needToBuyText + `\n`;
    finalOutput += hasStockText;
    finalOutput = finalOutput.trim();

    const textarea = document.createElement("textarea");
    textarea.value = finalOutput;
    textarea.style.position = "fixed";
    document.body.appendChild(textarea);
    textarea.select();
    textarea.setSelectionRange(0, 99999);

    try {
      document.execCommand("copy");
      alert("📋 複製成功！格式已完美對齊。");
    } catch (err) {
      alert("複製失敗");
    }
    document.body.removeChild(textarea);
  }

  function clearForm() {
    document.getElementById("itemId").value = "";
    document.getElementById("itemName").value = "";
    document.getElementById("itemQty").value = "";
    document.getElementById("itemCategory").value = "";
    document.getElementById("itemExpiry").value = "";
  }
</script>
</body>
</html>
