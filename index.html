<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <!-- Google Material Symbols（頂欄圖示）。圖示名稱可在 fonts.google.com/icons 自由替換 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" rel="stylesheet">
  <style>
    :root {
      --bg-main: #ffffff;
      --text-main: #000000;
      --text-muted: #8e8e93;   /* 已過期 = 淡灰 */
      --text-dim: #636366;
      --border-thin: #e5e5ea;
      --accent-red: #ff3b30;    /* 即將到期 = 紅 */
      --bg-input: #f2f2f7;
      --bg-dark: #1c1c1e;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      margin: 0; padding: 0;
      overflow: hidden;
    }

   .container {       width: 100%;       max-width: 420px;       margin: 0 auto;
      height: 100dvh;      /* 原本是 100vh */       display: flex;       flex-direction: column;     }
/* 頂欄固定在上方（利用 flex，而非 sticky） */     .sticky-top-panel {       flex-shrink: 0;
      
      background: rgba(255,255,255,.88);       backdrop-filter: blur(20px);       -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      padding: 16px 16px 12px;       border-bottom: 1px solid rgba(0,0,0,.06);     }

    header { display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 19px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

    .header-ops { display: flex; gap: 6px; align-items: center; }

    /* 圖示按鈕 */
    .material-symbols-rounded { font-size: 20px; line-height: 1; }
    .btn-base { height: 34px; width: 40px; padding: 0; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .btn-add { background: var(--bg-dark); color: #fff; }
    .btn-add.active { background: var(--accent-red); }
    .btn-edit { background: #f2f2f7; color: var(--text-main); }
    .btn-edit.active { background: var(--accent-red); color: #fff; }
    .btn-update { background: var(--bg-dark); color: #fff; }
    .btn-copy { background: #e5e5ea; color: var(--text-dim); }
    .hidden { display: none !important; }

    /* ===== 新增表單 ===== */
    .form-card { background: #fbfbfa; padding: 16px; border-radius: 8px; border: 1px solid var(--border-thin); margin-top: 12px; display: none; }
    .form-card.open { display: block; }
    .card-title { font-size: 12px; font-weight: 700; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-close-form { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-muted); font-weight: 500; }
    .form-control { width: 100%; height: 38px; padding: 0 10px; background: var(--bg-input); border: 1px solid var(--border-thin); border-radius: 6px; font-size: 14px; color: var(--text-main); }
    .form-control:focus { outline: none; border-color: #aeaea3; }
    .form-control.error { border-color: var(--accent-red); }
    select.form-control { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238e8e93' d='M0 0l5 5 5-5z'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 30px; }
    .field-hint { font-size: 11px; color: var(--accent-red); margin-top: 5px; min-height: 14px; }
    .btn-submit { width: 100%; height: 40px; background: var(--bg-dark); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn-submit[disabled] { opacity: 0.4; cursor: default; }

    /* ===== 清單 ===== */
    .scroll-content {       flex: 1;       min-height: 0;
      overflow-y: auto;       -webkit-overflow-scrolling: touch;
      padding: 12px 16px 40px;     }
    .category-block { margin-bottom: 24px; }
      /* 第一個分類與頂欄保留空隙 */     .category-block:first-child {     margin-top: 4px;     }
    .category-header { padding: 12px 4px 8px 4px; font-size: 14px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-thin); }
    .category-header.buy { color: var(--accent-red); font-weight: 700; }

    .item-row { padding: 12px 4px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f7; min-height: 54px; }
    .item-info { display: flex; flex-direction: column; gap: 2px; flex-grow: 1; overflow: hidden; padding-right: 8px; }
    .item-name { font-size: 15px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-name.expiry-soon { color: var(--accent-red); }           /* 30 天內 */
    .item-name.expiry-expired { color: var(--text-muted); }        /* 已過期 */
    .item-sub { font-size: 11px; color: var(--text-muted); }
    .item-sub.expiry-soon { color: var(--accent-red); }

    .qty-display { font-size: 13px; font-weight: 600; color: var(--text-dim); padding: 4px 10px; background: #f2f2f7; border-radius: 6px; flex-shrink: 0; }

    /* ===== 編輯模式 ===== */
    .item-row.editing { flex-direction: column; align-items: stretch; gap: 10px; }
    .item-row.editing.to-delete { opacity: 0.4; }
    .item-row.editing.to-delete .item-name { text-decoration: line-through; }
    .edit-line1 { display: flex; align-items: center; gap: 10px; }
    .edit-line1 .item-name { flex-grow: 1; }
    .edit-line2 { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; }

    .buy-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .buy-label { font-size: 13px; color: var(--text-dim); }
    .checkbox { width: 22px; height: 22px; border-radius: 5px; border: 1px solid #d1d1d6; position: relative; background: transparent; flex-shrink: 0; }
    .checkbox.checked { background: var(--bg-dark); border-color: var(--bg-dark); }
    .checkbox.checked::after { content: ''; position: absolute; width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); top: 4px; left: 8px; }

    .edit-field { display: flex; align-items: center; gap: 6px; }
    .edit-field label { font-size: 11px; color: var(--text-muted); }
    .edit-qty { width: 72px; height: 32px; background: #f4f4f6; border: 1px solid var(--border-thin); border-radius: 5px; text-align: center; font-size: 13px; padding: 0; }
    .edit-expiry { width: 150px; height: 32px; background: #f4f4f6; border: 1px solid var(--border-thin); border-radius: 5px; font-size: 12px; padding: 0 6px; }
    .edit-qty:focus, .edit-expiry:focus { outline: none; border-color: var(--text-muted); background: #fff; }

    .btn-delete { margin-left: auto; background: #ffebeb; border: none; color: var(--accent-red); padding: 0 10px; height: 30px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .item-row.editing.to-delete .btn-delete { background: #eef7ee; color: #34a853; }

    .status-text { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px; }
    .status-text .detail { font-size: 11px; color: #aeaea3; display: block; margin-top: 6px; word-break: break-all; }
  </style>
</head>
<body>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <h1>PocketStock</h1>
      <div class="header-ops">
        <button class="btn-base btn-add"    id="btnAdd"    onclick="openAddForm()"  aria-label="新增"><span class="material-symbols-rounded">add</span></button>
        <button class="btn-base btn-update hidden" id="btnUpdate" onclick="commitEdit()" aria-label="更新"><span class="material-symbols-rounded">check</span></button>
        <button class="btn-base btn-edit"   id="btnEdit"   onclick="toggleEditMode()" aria-label="編輯"><span class="material-symbols-rounded">edit</span></button>
        <button class="btn-base btn-copy"   id="btnCopy"   onclick="copyList()"     aria-label="複製"><span class="material-symbols-rounded">content_copy</span></button>
      </div>
    </header>

    <!-- 新增表單 -->
    <div class="form-card" id="formCard">
      <div class="card-title">
        <span>新增品項</span>
        <button class="btn-close-form" onclick="closeAddForm()">✕</button>
      </div>
      <div class="form-group">
        <label>項目名稱</label>
        <input type="text" id="inName" class="form-control" placeholder="例：雞蛋" oninput="checkNameDuplicate()">
        <div class="field-hint" id="nameHint"></div>
      </div>
      <div class="form-group">
        <label>數量單位</label>
        <input type="text" id="inQty" class="form-control" placeholder="例：0、2顆">
      </div>
      <div class="form-group">
        <label>有效期限（選填）</label>
        <input type="date" id="inExpiry" class="form-control">
      </div>
      <div class="form-group">
        <label>分類</label>
        <select id="inCategory" class="form-control"><option value="">載入中…</option></select>
      </div>
      <button type="button" id="btnSubmit" class="btn-submit" onclick="submitNewItem()">確認新增</button>
    </div>
  </div>

  <div class="scroll-content">
    <div id="statusInfo" class="status-text">載入中…</div>
    <div id="list"></div>
  </div>
</div>

<script>
  /* ========================================================================
     PocketStock 前端　依規格文件 v1.1
     ======================================================================== */

  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec";
  const NEAR_EXPIRY_DAYS = 30;
  const FETCH_TIMEOUT_MS = 10000;

  let allItems = [];
  let allCategories = [];
  let isEditMode = false;
  let editDrafts = {};
  let deleteSet = new Set();

  // ===== 純函式工具 =====
  function normalize(raw) {
    return {
      id:       raw['ID'] ?? '',
      name:     raw['名稱'] ?? '未命名',
      qty:      String(raw['庫存量'] ?? ''),
      category: raw['分類'] || '未分類',
      expiry:   toInputDate(raw['有效日期']),
      mustBuy:  raw['必買'] === true || String(raw['必買']).toUpperCase() === 'TRUE',
    };
  }

  function isZeroQty(qtyStr) {
    const m = String(qtyStr ?? '').trim().match(/^(\d+(?:\.\d+)?)/);
    return m ? parseFloat(m[1]) === 0 : false;
  }

  function daysUntilExpiry(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return null;
    const today = new Date(); today.setHours(0, 0, 0, 0);
    d.setHours(0, 0, 0, 0);
    return Math.round((d - today) / 86400000);
  }

  function expiryClass(dateStr) {
    const days = daysUntilExpiry(dateStr);
    if (days === null) return '';
    if (days < 0) return 'expiry-expired';
    if (days <= NEAR_EXPIRY_DAYS) return 'expiry-soon';
    return '';
  }

  function toInputDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatDateDisplay(dateStr) {
    const iso = toInputDate(dateStr);
    return iso ? iso.replace(/-/g, '/') : '';
  }

  function expiryTimestamp(dateStr) {
    if (!dateStr) return Infinity;
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? Infinity : d.getTime();
  }

  function todayTitle() {
    const n = new Date();
    return `${n.getMonth() + 1}/${n.getDate()} 盤點表`;
  }

  // 換頂欄按鈕的圖示
  function setBtnIcon(id, icon) {
    document.getElementById(id).querySelector('.material-symbols-rounded').textContent = icon;
  }

  // ===== 與後端溝通 =====
  function apiFetch(options) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
    return fetch(GAS_WEB_APP_URL, { ...options, signal: controller.signal })
      .finally(() => clearTimeout(timer));
  }
  function apiPost(payload) {
    return apiFetch({ method: 'POST', body: JSON.stringify(payload) }).then(r => r.json());
  }

  // ===== 載入 =====
  document.addEventListener('DOMContentLoaded', loadInventory);

  function loadInventory() {
    showStatus('載入中…');
    document.getElementById('list').innerHTML = '';
    apiFetch({ method: 'GET' })
      .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
      .then(res => {
        if (res.status === 'success') {
          allItems = (res.data || []).map(normalize);
          allCategories = res.categories || [];
          renderCategoryDropdown();
          hideStatus();
          renderList();
        } else {
          showStatus('載入資料失敗', res.message || '後端未回傳具體原因');
        }
      })
      .catch(err => showStatus('連線失敗', err.toString()));
  }

  // ===== 狀態/錯誤（textContent，防 XSS）=====
  function showStatus(main, detail) {
    const el = document.getElementById('statusInfo');
    el.style.display = 'block';
    el.textContent = main;
    if (detail) {
      const span = document.createElement('span');
      span.className = 'detail';
      span.textContent = '原因：' + detail;
      el.appendChild(span);
    }
    document.getElementById('list').innerHTML = '';
  }
  function hideStatus() { document.getElementById('statusInfo').style.display = 'none'; }

  // ===== 渲染 =====
  function partition(items) {
    const buy = [];
    const groups = {};
    items.forEach(it => {
      if (isZeroQty(it.qty) && it.mustBuy) buy.push(it);
      else (groups[it.category] = groups[it.category] || []).push(it);
    });
    return { buy, groups };
  }

  function orderedCategories(groups) {
    const ordered = [];
    allCategories.forEach(c => { if (groups[c]) ordered.push(c); });
    Object.keys(groups).forEach(c => { if (!ordered.includes(c)) ordered.push(c); });
    return ordered;
  }

  function renderList() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    if (!allItems.length) {
      list.innerHTML = '<div class="status-text">清單目前是空的。</div>';
      return;
    }

    const { buy, groups } = partition(allItems);

    if (buy.length) {
      const block = makeBlock('⚠️ 下次要買', true);
      buy.forEach(it => block.appendChild(makeRow(it, true)));
      list.appendChild(block);
    }

    orderedCategories(groups).forEach(cat => {
      const block = makeBlock(cat, false);
      sortByExpiry(groups[cat]).forEach(it => block.appendChild(makeRow(it, false)));
      list.appendChild(block);
    });
  }

  function makeBlock(title, isBuy) {
    const block = document.createElement('div');
    block.className = 'category-block';
    const header = document.createElement('div');
    header.className = 'category-header' + (isBuy ? ' buy' : '');
    header.textContent = title;
    block.appendChild(header);
    return block;
  }

  function sortByExpiry(arr) {
    return arr.slice().sort((a, b) => expiryTimestamp(a.expiry) - expiryTimestamp(b.expiry));
  }

  function makeRow(item, inBuy) {
    return isEditMode ? makeEditRow(item, inBuy) : makeDisplayRow(item, inBuy);
  }

  // 顯示模式
  function makeDisplayRow(item, inBuy) {
    const row = document.createElement('div');
    row.className = 'item-row';
    const info = document.createElement('div');
    info.className = 'item-info';
    const name = document.createElement('div');
    name.textContent = item.name;

    if (inBuy) {                       // 下次要買區：只顯示名稱
      name.className = 'item-name';
      info.appendChild(name);
      row.appendChild(info);
      return row;
    }

    name.className = 'item-name ' + expiryClass(item.expiry);
    info.appendChild(name);
    if (item.expiry) {
      const sub = document.createElement('div');
      sub.className = 'item-sub ' + expiryClass(item.expiry);
      sub.textContent = '效期：' + formatDateDisplay(item.expiry);
      info.appendChild(sub);
    }
    row.appendChild(info);

    const qty = document.createElement('span');
    qty.className = 'qty-display';
    qty.textContent = item.qty;
    row.appendChild(qty);
    return row;
  }

  // 編輯模式
  function makeEditRow(item, inBuy) {
    const draft = editDrafts[item.id];
    const row = document.createElement('div');
    row.className = 'item-row editing';
    if (deleteSet.has(item.id)) row.classList.add('to-delete');

    // 第 1 行：名稱 + 刪除
    const line1 = document.createElement('div');
    line1.className = 'edit-line1';
    const name = document.createElement('div');
    name.className = 'item-name ' + expiryClass(item.expiry);
    name.textContent = item.name;
    const del = document.createElement('button');
    del.className = 'btn-delete';
    del.textContent = deleteSet.has(item.id) ? '復原' : '刪除';
    del.onclick = () => {
      if (deleteSet.has(item.id)) deleteSet.delete(item.id); else deleteSet.add(item.id);
      row.classList.toggle('to-delete', deleteSet.has(item.id));
      del.textContent = deleteSet.has(item.id) ? '復原' : '刪除';
    };
    line1.appendChild(name);
    line1.appendChild(del);
    row.appendChild(line1);

    // 第 2 行：必買 + 庫存 + 效期
    const line2 = document.createElement('div');
    line2.className = 'edit-line2';

    // 必買（勾選框 + 文字，整塊可點）
    const buyToggle = document.createElement('div');
    buyToggle.className = 'buy-toggle';
    const cb = document.createElement('div');
    cb.className = 'checkbox' + (draft.mustBuy ? ' checked' : '');
    const buyLabel = document.createElement('span');
    buyLabel.className = 'buy-label';
    buyLabel.textContent = '必買';
    buyToggle.appendChild(cb);
    buyToggle.appendChild(buyLabel);
    buyToggle.onclick = () => { draft.mustBuy = !draft.mustBuy; cb.classList.toggle('checked', draft.mustBuy); };
    line2.appendChild(buyToggle);

    // 庫存
    const qtyField = document.createElement('div');
    qtyField.className = 'edit-field';
    const qtyLabel = document.createElement('label'); qtyLabel.textContent = '庫存';
    const qtyInput = document.createElement('input');
    qtyInput.type = 'text'; qtyInput.className = 'edit-qty'; qtyInput.value = draft.qty;
    qtyInput.oninput = () => { draft.qty = qtyInput.value; };
    qtyField.appendChild(qtyLabel); qtyField.appendChild(qtyInput);
    line2.appendChild(qtyField);

    // 效期
    const expField = document.createElement('div');
    expField.className = 'edit-field';
    const expLabel = document.createElement('label'); expLabel.textContent = '效期';
    const expInput = document.createElement('input');
    expInput.type = 'date'; expInput.className = 'edit-expiry'; expInput.value = draft.expiry;
    expInput.oninput = () => { draft.expiry = expInput.value; };
    expField.appendChild(expLabel); expField.appendChild(expInput);
    line2.appendChild(expField);

    row.appendChild(line2);
    return row;
  }

  // ===== 新增 =====
  function renderCategoryDropdown() {
    const sel = document.getElementById('inCategory');
    sel.innerHTML = '<option value="">請選擇分類…</option>';
    allCategories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat; opt.textContent = cat;
      sel.appendChild(opt);
    });
  }

  function openAddForm() {
    if (isEditMode) return;
    clearForm();
    const open = document.getElementById('formCard').classList.toggle('open');
    setBtnIcon('btnAdd', open ? 'close' : 'add');
    document.getElementById('btnAdd').classList.toggle('active', open);
  }

  function closeAddForm() {
    document.getElementById('formCard').classList.remove('open');
    setBtnIcon('btnAdd', 'add');
    document.getElementById('btnAdd').classList.remove('active');
    clearForm();
  }

  function clearForm() {
    document.getElementById('inName').value = '';
    document.getElementById('inQty').value = '';
    document.getElementById('inExpiry').value = '';
    document.getElementById('inCategory').value = '';
    document.getElementById('inName').classList.remove('error');
    document.getElementById('nameHint').textContent = '';
    document.getElementById('btnSubmit').disabled = false;
  }

  function checkNameDuplicate() {
    const name = document.getElementById('inName').value.trim();
    const dup = name && allItems.some(it => it.name.trim() === name);
    document.getElementById('nameHint').textContent = dup ? '名稱已存在' : '';
    document.getElementById('inName').classList.toggle('error', !!dup);
    document.getElementById('btnSubmit').disabled = !!dup;
    return dup;
  }

  function submitNewItem() {
    const name = document.getElementById('inName').value.trim();
    const qty = document.getElementById('inQty').value.trim();
    const expiry = document.getElementById('inExpiry').value;
    const category = document.getElementById('inCategory').value.trim();

    if (!name || qty === '' || !category) { alert('請填寫名稱、數量與分類。'); return; }
    if (checkNameDuplicate()) { alert('名稱已存在，請換一個名稱。'); return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true; btn.textContent = '新增中…';
    apiPost({ action: 'save', data: { name, qty, category, expiry } })
      .then(res => {
        btn.disabled = false; btn.textContent = '確認新增';
        if (res.status === 'success') { closeAddForm(); loadInventory(); }
        else alert('新增失敗：' + (res.message || '未知錯誤'));
      })
      .catch(err => {
        btn.disabled = false; btn.textContent = '確認新增';
        alert('新增連線失敗：' + err.toString());
      });
  }

  // ===== 編輯 / 更新 / 取消 =====
  function toggleEditMode() { if (isEditMode) cancelEdit(); else enterEditMode(); }

  function enterEditMode() {
    closeAddForm();
    isEditMode = true;
    deleteSet.clear();
    editDrafts = {};
    allItems.forEach(it => { editDrafts[it.id] = { qty: it.qty, expiry: it.expiry, mustBuy: it.mustBuy }; });
    document.getElementById('btnAdd').classList.add('hidden');
    document.getElementById('btnUpdate').classList.remove('hidden');
    setBtnIcon('btnEdit', 'close');
    document.getElementById('btnEdit').classList.add('active');
    renderList();
  }

  function exitEditModeUI() {
    isEditMode = false;
    editDrafts = {};
    deleteSet.clear();
    document.getElementById('btnAdd').classList.remove('hidden');
    document.getElementById('btnUpdate').classList.add('hidden');
    setBtnIcon('btnEdit', 'edit');
    document.getElementById('btnEdit').classList.remove('active');
  }

  function cancelEdit() { exitEditModeUI(); renderList(); }

  function commitEdit() {
    const updates = [];
    allItems.forEach(it => {
      if (deleteSet.has(it.id)) return;
      const d = editDrafts[it.id];
      if (d.qty !== it.qty || d.expiry !== it.expiry || d.mustBuy !== it.mustBuy)
        updates.push({ id: it.id, qty: d.qty, expiry: d.expiry, mustBuy: d.mustBuy });
    });
    const deletes = [...deleteSet];
    if (!updates.length && !deletes.length) { cancelEdit(); return; }

    const btn = document.getElementById('btnUpdate');
    btn.disabled = true;
    showStatus('儲存中…');
    apiPost({ action: 'commit', updates, deletes })
      .then(res => {
        btn.disabled = false;
        if (res.status === 'success') {
          const failNames = (res.failedItems || []).map(id => {
            const f = allItems.find(it => String(it.id) === String(id));
            return f ? f.name : id;
          });
          alert(res.failed > 0
            ? `更新完成：成功 ${res.updated} 筆，失敗 ${res.failed} 筆（${failNames.join('、')}）`
            : `更新完成：成功 ${res.updated} 筆`);
          exitEditModeUI();
          loadInventory();
        } else { hideStatus(); alert('更新失敗：' + (res.message || '未知錯誤')); }
      })
      .catch(err => { btn.disabled = false; hideStatus(); alert('更新連線失敗：' + err.toString()); });
  }

  // ===== 複製（條列式；快過期加 ❗️）=====
  function copyList() {
    if (!allItems.length) return;
    const { buy, groups } = partition(allItems);

    let out = todayTitle() + '\n\n';

    if (buy.length) {
      out += '⚠️ 下次要買：\n';
      buy.forEach(it => { out += '・' + it.name + '\n'; });   // 只列名稱
      out += '\n';
    }

    orderedCategories(groups).forEach(cat => {
      out += '🔹 ' + cat + '：\n';
      sortByExpiry(groups[cat]).forEach(it => {
        const mark = expiryClass(it.expiry) === 'expiry-soon' ? ' ❗️' : '';  // 快過期標記
        out += '・' + it.name + ' ' + it.qty + mark + '\n';
      });
      out += '\n';
    });

    out = out.trim();
    navigator.clipboard.writeText(out)
      .then(() => alert(`📋 已複製「${todayTitle()}」`))
      .catch(() => alert('複製失敗，請手動全選複製。'));
  }
</script>
