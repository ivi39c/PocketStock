<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <style>
    /* CSS 維持不變，確保外觀一致 */
    :root { --bg-main: #ffffff; --text-main: #000000; --text-muted: #8e8e93; --text-dim: #636366; --border-thin: #e5e5ea; --accent-orange: #ff9500; --accent-red: #ff3b30; --bg-input: #f2f2f7; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-main); margin: 0; }
    .container { width: 100%; max-width: 420px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .sticky-top-panel { padding: 16px; border-bottom: 1px solid #f2f2f7; }
    header { display: flex; justify-content: space-between; align-items: center; }
    .header-ops { display: flex; gap: 5px; }
    .btn-base { height: 30px; padding: 0 10px; font-size: 13px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
    .btn-add { background: #1c1c1e; color: #ffffff; }
    .scroll-content { flex-grow: 1; overflow-y: auto; padding: 16px; }
    .form-card { background: #fbfbfa; padding: 16px; border-radius: 8px; border: 1px solid var(--border-thin); margin-top: 12px; display: none; }
    .form-group { margin-bottom: 12px; }
    .form-control { width: 100%; height: 38px; background: var(--bg-input); border: 1px solid var(--border-thin); border-radius: 6px; padding: 0 10px; }
    .btn-submit { width: 100%; height: 40px; background: #1c1c1e; color: #ffffff; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <h1>PocketStock</h1>
      <div class="header-ops">
        <button class="btn-base btn-add" id="toggleAddBtn" onclick="openAddForm()">Add</button>
      </div>
    </header>

    <div class="form-card" id="formCard">
      <div class="form-group"><label>項目名稱</label><input type="text" id="itemName" class="form-control"></div>
      <div class="form-group"><label>數量</label><input type="text" id="itemQty" class="form-control"></div>
      <div class="form-group"><label>分類</label><select id="itemCategory" class="form-control"></select></div>
      <button class="btn-submit" onclick="saveNewItem()">確認新增</button>
    </div>
  </div>

  <div class="scroll-content">
    <div id="statusInfo" class="status-text">載入中...</div>
    <div id="inventoryList"></div>
  </div>
</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec";

  // 確保 DOM 載入後才執行
  document.addEventListener("DOMContentLoaded", fetchInventory);

  function fetchInventory() {
    const status = document.getElementById("statusInfo");
    if (!status) return; // 安全檢查

    fetch(GAS_WEB_APP_URL)
      .then(res => res.json())
      .then(res => {
        if (res.status === "success") {
          status.style.display = "none";
          renderList(res.data);
        } else {
          status.innerText = "載入失敗: " + res.message;
        }
      })
      .catch(err => status.innerText = "連線錯誤: " + err);
  }

  function openAddForm() {
    const card = document.getElementById("formCard");
    card.style.display = (card.style.display === "block") ? "none" : "block";
  }

  function saveNewItem() {
    const payload = {
      action: "save",
      data: {
        name: document.getElementById("itemName").value,
        qty: document.getElementById("itemQty").value,
        category: document.getElementById("itemCategory").value
      }
    };
    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(() => {
        alert("新增成功");
        fetchInventory();
        openAddForm();
      });
  }

  function renderList(items) {
    const list = document.getElementById("inventoryList");
    list.innerHTML = items.map(i => `<div>${i['名稱']} - ${i['庫存量']}</div>`).join('');
  }
</script>
</body>
</html>
