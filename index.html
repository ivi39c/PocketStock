<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <style>
    :root { --bg-main: #ffffff; --text-main: #000000; --text-muted: #8e8e93; --accent-orange: #ff9500; --accent-red: #ff3b30; --bg-input: #f2f2f7; --border-thin: #e5e5ea; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; }
    .container { width: 100%; max-width: 420px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .sticky-top-panel { position: sticky; top: 0; background: var(--bg-main); z-index: 100; padding: 16px; border-bottom: 1px solid #f2f2f7; }
    header { display: flex; justify-content: space-between; align-items: center; }
    .header-ops { display: flex; gap: 5px; }
    .btn-base { height: 30px; padding: 0 10px; font-size: 13px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
    .btn-submit { background: var(--accent-orange); color: white; display: none; }
    .btn-edit.active { background: var(--accent-red); color: white; }
    .scroll-content { flex-grow: 1; overflow-y: auto; padding: 16px; }
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f7; }
    .qty-text { font-size: 14px; font-weight: 600; color: #333; }
    .inline-qty-input { width: 60px; height: 30px; border: 1px solid var(--border-thin); border-radius: 4px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <h1>PocketStock</h1>
      <div class="header-ops">
        <button class="btn-base btn-submit" id="submitBtn" onclick="submitChanges()">送出</button>
        <button class="btn-base" id="toggleEditBtn" onclick="toggleEditMode()">Edit</button>
      </div>
    </header>
  </div>
  <div class="scroll-content">
    <div id="inventoryList">載入中...</div>
  </div>
</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec";
  let globalData = [];
  let isEditMode = false;

  document.addEventListener("DOMContentLoaded", fetchInventory);

  function fetchInventory() {
    fetch(GAS_WEB_APP_URL)
      .then(res => res.json())
      .then(res => {
        globalData = res.data;
        renderList();
      });
  }

  function toggleEditMode() {
    isEditMode = !isEditMode;
    const btn = document.getElementById("toggleEditBtn");
    const subBtn = document.getElementById("submitBtn");
    
    btn.innerText = isEditMode ? "關閉" : "Edit";
    btn.className = isEditMode ? "btn-base btn-edit active" : "btn-base btn-edit";
    subBtn.style.display = isEditMode ? "inline-block" : "none";
    
    renderList();
  }

  function renderList() {
    const list = document.getElementById("inventoryList");
    list.innerHTML = "";
    globalData.forEach(item => {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <div>${item['名稱']}</div>
        <div>
          ${isEditMode ? 
            `<input type="text" class="inline-qty-input" value="${item['庫存量']}" data-id="${item['ID']}">` : 
            `<span class="qty-text">${item['庫存量']}</span>`
          }
        </div>
      `;
      list.appendChild(row);
    });
  }

  function submitChanges() {
    const inputs = document.querySelectorAll('.inline-qty-input');
    const updates = Array.from(inputs).map(input => ({
      id: input.dataset.id,
      qty: input.value
    }));

    document.getElementById("submitBtn").innerText = "處理中...";
    
    // 批次送出：這裡呼叫 GAS，請確保後端有對應邏輯
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "batchSave", data: updates })
    })
    .then(res => res.json())
    .then(res => {
      alert("資料已更新");
      document.getElementById("submitBtn").innerText = "送出";
      toggleEditMode();
      fetchInventory();
    });
  }
</script>
</body>
</html>
