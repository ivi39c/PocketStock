<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <meta name="description" content="快速盤點工具，隨手更新庫存、設定有效期限。">
  <meta property="og:title" content="PocketStock">
  <meta property="og:description" content="快速盤點工具，隨手更新庫存、設定有效期限。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ivi39c.github.io/PocketStock/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" rel="stylesheet">
  <style>
    :root {
      --bg-main: #ffffff;
      --text-main: #000000;
      --text-muted: #8e8e93;
      --text-dim: #636366;
      --border-thin: #e5e5ea;
      --accent-red: #ff3b30;
      --accent-purple: #af52de;
      --bg-input: #f2f2f7;
      --bg-dark: #1c1c1e;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 0; }

    .container { width: 100%; max-width: 420px; margin: 0 auto; }
    .sticky-top-panel { position: sticky; top: 0; background: var(--bg-main); z-index: 100; padding: 16px 16px 12px 16px; border-bottom: 1px solid #f2f2f7; }

    header { display: flex; justify-content: space-between; align-items: center; }
    .title-wrap { display: flex; align-items: center; gap: 5px; }
    header h1 { font-size: 19px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

    .btn-help-inline { background: transparent; border: none; padding: 0; margin: 0; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; }
    .btn-help-inline .material-symbols-rounded { font-size: 17px; }
    .btn-help-inline.active { color: var(--accent-red); }

    .header-ops { display: flex; gap: 4px; align-items: center; }

    .material-symbols-rounded { font-size: 20px; line-height: 1; }
    .btn-base { height: 34px; width: 38px; padding: 0; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .btn-base[disabled] { opacity: 0.35; cursor: default; }
    .btn-ghost { background: transparent; color: var(--text-dim); }
    .btn-ghost.active { background: transparent; color: var(--accent-red); }
    .btn-add { background: var(--bg-dark); color: #fff; }
    .btn-add.active { background: var(--accent-red); }
    .btn-edit { background: #f2f2f7; color: var(--text-main); }
    .btn-edit.active { background: var(--accent-red); color: #fff; }
    .btn-update { background: var(--bg-dark); color: #fff; }
    .hidden { display: none !important; }

    /* 登入遮罩 */
    .auth-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { text-align: center; }
    .auth-card h2 { font-size: 24px; font-weight: 700; margin: 0 0 6px; }
    .auth-card p { color: var(--text-muted); font-size: 14px; margin: 0 0 22px; }
    #gbtn { display: inline-flex; justify-content: center; }
    .auth-msg { color: var(--accent-red); font-size: 13px; margin-top: 16px; min-height: 18px; }

    .btn-logout { margin-top: 4px; background: #f2f2f7; border: none; color: var(--text-dim); padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }

    /* 搜尋列 */
    .search-bar { display: none; align-items: center; gap: 8px; margin-top: 12px; background: var(--bg-input); border: 1px solid var(--border-thin); border-radius: 8px; padding: 0 10px; height: 38px; }
    .search-bar.open { display: flex; }
    .search-bar .search-ico { font-size: 18px; color: var(--text-muted); }
    .search-input { flex: 1; border: none; background: transparent; font-size: 14px; height: 100%; outline: none; color: var(--text-main); }
    .search-clear { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 4px 2px; }

    /* 卡片 */
    .form-card { background: #fbfbfa; padding: 16px; border-radius: 8px; border: 1px solid var(--border-thin); margin-top: 12px; display: none; }
    .form-card.open { display: block; }
    .card-title { font-size: 12px; font-weight: 700; margin-bottom: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-muted); font-weight: 500; }
    .form-control { width: 100%; height: 38px; padding: 0 10px; background: var(--bg-input); border: 1px solid var(--border-thin); border-radius: 6px; font-size: 14px; color: var(--text-main); }
    .form-control:focus { outline: none; border-color: #aeaea3; }
    .form-control.error { border-color: var(--accent-red); }
    select.form-control { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238e8e93' d='M0 0l5 5 5-5z'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 30px; }
    .field-hint { font-size: 11px; color: var(--accent-red); margin-top: 5px; min-height: 14px; }
    .btn-submit { width: 100%; height: 40px; background: var(--bg-dark); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn-submit[disabled] { opacity: 0.4; cursor: default; }

    .help-body p { font-size: 13px; color: var(--text-dim); margin: 9px 0; line-height: 1.55; }
    .help-body b { color: var(--text-main); }
    .help-body hr { border: none; border-top: 1px solid var(--border-thin); margin: 12px 0; }
    .legend-dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }

    /* 清單 */
    .scroll-content { padding: 0 16px 40px 16px; }
    .category-block { margin-bottom: 24px; }
    .category-header { padding: 12px 4px 8px 4px; font-size: 14px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-thin); display: flex; justify-content: space-between; align-items: center; }
    .category-header.buy { color: var(--accent-red); font-weight: 700; }
    .category-header.collapsible { cursor: pointer; }
    .cat-count { color: #c7c7cc; font-weight: 400; }
    .chev { font-size: 20px; color: var(--text-muted); }

    .item-row { padding: 12px 4px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f7; min-height: 54px; }
    .item-info { display: flex; flex-direction: column; gap: 2px; flex-grow: 1; overflow: hidden; padding-right: 8px; }
    .item-name { font-size: 15px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-name.expiry-soon { color: var(--accent-red); }
    .item-name.expiry-expired { color: var(--accent-purple); }
    .item-sub { font-size: 11px; color: var(--text-muted); }
    .item-sub.expiry-soon { color: var(--accent-red); }
    .item-sub.expiry-expired { color: var(--accent-purple); }

    .qty-display { font-size: 13px; font-weight: 600; color: var(--text-dim); flex-shrink: 0; }

    .item-row.editing { flex-direction: column; align-items: stretch; gap: 10px; }
    .item-row.editing.to-delete { opacity: 0.4; }
    .item-row.editing.to-delete .item-name { text-decoration: line-through; }
    .edit-line1 { display: flex; align-items: center; gap: 10px; }
    .edit-line1 .item-name { flex-grow: 1; }
    .edit-line2 { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; }

    .buy-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .buy-label { font-size: 13px; color: var(--text-dim); }
    .checkbox { width: 22px; height: 22px; border-radius: 5px; border: 1px solid #d1d1d6; position: relative; background: transparent; flex-shrink: 0; }
    .checkbox.checked { background: var(--bg-dark); border-color: var(--bg-dark); }
    .checkbox.checked::after { content: ''; position: absolute; width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); top: 4px; left: 8px; }

    .edit-field { display: flex; align-items: center; gap: 6px; }
    .edit-field label { font-size: 11px; color: var(--text-muted); }
    .edit-qty { width: 72px; height: 32px; background: #f4f4f6; border: 1px solid var(--border-thin); border-radius: 5px; text-align: center; font-size: 13px; padding: 0; }
    .edit-expiry { width: 150px; height: 32px; background: #f4f4f6; border: 1px solid var(--border-thin); border-radius: 5px; font-size: 12px; padding: 0 6px; }
    .edit-qty:focus, .edit-expiry:focus { outline: none; border-color: var(--text-muted); background: #fff; }

    .btn-delete { margin-left: auto; background: #ffebeb; border: none; color: var(--accent-red); padding: 0 10px; height: 30px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .item-row.editing.to-delete .btn-delete { background: #eef7ee; color: #34a853; }

    .status-text { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px; }
    .status-text .detail { font-size: 11px; color: #aeaea3; display: block; margin-top: 6px; word-break: break-all; }
  </style>
</head>
<body>

<!-- 登入畫面 -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2>PocketStock</h2>
    <p>請用團隊 Google 帳號登入</p>
    <div id="gbtn"></div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <div class="title-wrap">
        <h1>PocketStock</h1>
        <button class="btn-help-inline" id="btnHelp" onclick="toggleHelp()" aria-label="說明"><span class="material-symbols-rounded">help</span></button>
      </div>
      <div class="header-ops">
        <button class="btn-base btn-ghost"  id="btnSearch" onclick="toggleSearch()"   aria-label="搜尋"><span class="material-symbols-rounded">search</span></button>
        <button class="btn-base btn-ghost"  id="btnCopy"   onclick="copyList()"       aria-label="複製"><span class="material-symbols-rounded">content_copy</span></button>
        <button class="btn-base btn-edit"   id="btnEdit"   onclick="toggleEditMode()" aria-label="編輯"><span class="material-symbols-rounded">edit</span></button>
        <button class="btn-base btn-update hidden" id="btnUpdate" onclick="commitEdit()" aria-label="更新"><span class="material-symbols-rounded">check</span></button>
        <button class="btn-base btn-add"    id="btnAdd"    onclick="openAddForm()"    aria-label="新增"><span class="material-symbols-rounded">add</span></button>
      </div>
    </header>

    <div class="search-bar" id="searchBar">
      <span class="material-symbols-rounded search-ico">search</span>
      <input type="text" id="searchInput" class="search-input" placeholder="搜尋品名…" oninput="onSearch()">
      <button class="search-clear" onclick="clearSearch()" aria-label="清除">✕</button>
    </div>

    <div class="form-card" id="helpCard">
      <div class="card-title">使用說明</div>
      <div class="help-body">
        <p><b>＋ 新增</b>　新增一筆品項。</p>
        <p><b>✎ 編輯</b>　可改庫存、效期，勾「必買」，或刪除品項。改完按 <b>✓</b> 儲存、<b>✕</b> 取消。</p>
        <p><b>⧉ 複製</b>　複製整份盤點清單，可貼到 LINE。</p>
        <p><b>🔍 搜尋</b>　輸入品名快速找到項目。</p>
        <hr>
        <p><b>關於「必買」</b>　勾選後，當庫存變成 0，會自動移到最上方「⚠️ 下次要買」區。</p>
        <p><b>分類收合</b>　點分類標題可收合／展開，狀態會記住。</p>
        <hr>
        <p><b>顏色說明</b></p>
        <p><span class="legend-dot" style="background:#ff3b30"></span>紅字：30 天內即將到期</p>
        <p><span class="legend-dot" style="background:#af52de"></span>紫字：已經過期</p>
        <hr>
        <p>目前登入：<b id="curUser">—</b></p>
        <button class="btn-logout" onclick="logout()">登出</button>
      </div>
    </div>

    <div class="form-card" id="formCard">
      <div class="card-title">新增品項</div>
      <div class="form-group">
        <label>項目名稱</label>
        <input type="text" id="inName" class="form-control" placeholder="例：雞蛋" oninput="checkNameDuplicate()">
        <div class="field-hint" id="nameHint"></div>
      </div>
      <div class="form-group">
        <label>數量單位</label>
        <input type="text" id="inQty" class="form-control" placeholder="例：0、2顆">
      </div>
      <div class="form-group">
        <label>有效期限（選填）</label>
        <input type="date" id="inExpiry" class="form-control">
      </div>
      <div class="form-group">
        <label>分類</label>
        <select id="inCategory" class="form-control"><option value="">載入中…</option></select>
      </div>
      <button type="button" id="btnSubmit" class="btn-submit" onclick="submitNewItem()">確認新增</button>
    </div>
  </div>

  <div class="scroll-content">
    <div id="statusInfo" class="status-text">請先登入…</div>
    <div id="list"></div>
  </div>
</div>

<script>
  /* ===== ① 你要填：從 Google Cloud 取得的 OAuth 用戶端 ID ===== */
  const GOOGLE_CLIENT_ID = "336652370427-nhis1d8hn5917rae8nv5uqossne05mc3.apps.googleusercontent.com";

  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec";
  const NEAR_EXPIRY_DAYS = 30;
  const FETCH_TIMEOUT_MS = 12000;
  const COLLAPSE_KEY = 'pocketstock_collapsed';

  let allItems = [], allCategories = [];
  let isEditMode = false, editDrafts = {}, deleteSet = new Set();
  let isBusy = false, searchQuery = '';
  let collapsedCats = loadCollapsed();
  let idToken = '', userEmail = '';

  // ===== Google 登入 =====
  function initGsi() {
    if (!window.google || !google.accounts) {
      document.getElementById('authMsg').textContent = '無法載入 Google 登入元件，請檢查網路後重新整理。';
      return;
    }
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogleSignIn, auto_select: true });
    google.accounts.id.renderButton(document.getElementById('gbtn'), { theme: 'filled_blue', size: 'large', shape: 'pill', text: 'signin_with' });
    google.accounts.id.prompt();
  }

  function onGoogleSignIn(resp) {
    idToken = resp.credential;
    userEmail = decodeJwtEmail(idToken);
    document.getElementById('curUser').textContent = userEmail || '—';
    document.getElementById('authOverlay').style.display = 'none';
    loadInventory();
  }

  function showAuth(msg) {
    idToken = '';
    document.getElementById('authMsg').textContent = msg || '';
    document.getElementById('authOverlay').style.display = 'flex';
    try { google.accounts.id.prompt(); } catch (e) {}
  }

  function logout() {
    idToken = ''; userEmail = '';
    try { google.accounts.id.disableAutoSelect(); } catch (e) {}
    showAuth('已登出');
  }

  function decodeJwtEmail(jwt) {
    try { const p = JSON.parse(atob(jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); return p.email || ''; }
    catch (e) { return ''; }
  }

  // ===== 純函式工具 =====
  function normalize(raw) {
    return {
      id: raw['ID'] ?? '', name: raw['名稱'] ?? '未命名', qty: String(raw['庫存量'] ?? ''),
      category: raw['分類'] || '未分類', expiry: toInputDate(raw['有效日期']),
      mustBuy: raw['必買'] === true || String(raw['必買']).toUpperCase() === 'TRUE',
    };
  }
  function isZeroQty(q) { const m = String(q ?? '').trim().match(/^(\d+(?:\.\d+)?)/); return m ? parseFloat(m[1]) === 0 : false; }
  function daysUntilExpiry(s) {
    if (!s) return null; const d = new Date(s); if (isNaN(d.getTime())) return null;
    const t = new Date(); t.setHours(0, 0, 0, 0); d.setHours(0, 0, 0, 0); return Math.round((d - t) / 86400000);
  }
  function expiryClass(s) { const d = daysUntilExpiry(s); if (d === null) return ''; if (d < 0) return 'expiry-expired'; if (d <= NEAR_EXPIRY_DAYS) return 'expiry-soon'; return ''; }
  function toInputDate(s) {
    if (!s) return ''; const d = new Date(s); if (isNaN(d.getTime())) return '';
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function formatDateDisplay(s) { const i = toInputDate(s); return i ? i.replace(/-/g, '/') : ''; }
  function expiryTimestamp(s) { if (!s) return Infinity; const d = new Date(s); return isNaN(d.getTime()) ? Infinity : d.getTime(); }
  function todayTitle() { const n = new Date(); return `${n.getMonth() + 1}/${n.getDate()} 盤點表`; }
  function setBtnIcon(id, icon) { document.getElementById(id).querySelector('.material-symbols-rounded').textContent = icon; }
  function loadCollapsed() { try { const s = localStorage.getItem(COLLAPSE_KEY); return new Set(s ? JSON.parse(s) : []); } catch (e) { return new Set(); } }
  function saveCollapsed() { try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...collapsedCats])); } catch (e) {} }

  // ===== 與後端溝通（每個請求帶 idToken）=====
  function apiPost(payload) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
    return fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ ...payload, idToken }), signal: controller.signal })
      .finally(() => clearTimeout(timer))
      .then(r => r.json())
      .then(res => { if (res && res.auth === false) { showAuth(res.message || '請重新登入'); }
        return res; });
  }

  // ===== 載入 =====
  function loadInventory() {
    showStatus('載入中…');
    document.getElementById('list').innerHTML = '';
    apiPost({ action: 'list' })
      .then(res => {
        if (!res || res.auth === false) return;
        if (res.status === 'success') {
          allItems = (res.data || []).map(normalize);
          allCategories = res.categories || [];
          renderCategoryDropdown();
          hideStatus();
          renderList();
        } else { showStatus('載入資料失敗', res.message || '後端未回傳具體原因'); }
      })
      .catch(err => showStatus('連線失敗（請下拉或重新整理頁面再試）', err.toString()));
  }

  function showStatus(main, detail) {
    const el = document.getElementById('statusInfo');
    el.style.display = 'block'; el.textContent = main;
    if (detail) { const s = document.createElement('span'); s.className = 'detail'; s.textContent = '原因：' + detail; el.appendChild(s); }
    document.getElementById('list').innerHTML = '';
  }
  function hideStatus() { document.getElementById('statusInfo').style.display = 'none'; }

  // ===== 渲染 =====
  function filteredItems() { const q = searchQuery.trim().toLowerCase(); if (!q) return allItems; return allItems.filter(it => it.name.toLowerCase().includes(q)); }
  function partition(items) {
    const buy = [], groups = {};
    items.forEach(it => { if (isZeroQty(it.qty) && it.mustBuy) buy.push(it); else (groups[it.category] = groups[it.category] || []).push(it); });
    return { buy, groups };
  }
  function orderedCategories(groups) {
    const o = []; allCategories.forEach(c => { if (groups[c]) o.push(c); });
    Object.keys(groups).forEach(c => { if (!o.includes(c)) o.push(c); }); return o;
  }
  function sortItems(arr) {
    return arr.slice().sort((a, b) => { const ta = expiryTimestamp(a.expiry), tb = expiryTimestamp(b.expiry);
      if (ta !== tb) return ta - tb; return a.name.localeCompare(b.name, 'zh-Hant-u-co-stroke'); });
  }

  function renderList() {
    const list = document.getElementById('list'); list.innerHTML = '';
    const items = filteredItems();
    if (!items.length) { list.innerHTML = searchQuery.trim() ? '<div class="status-text">找不到符合的項目。</div>' : '<div class="status-text">清單目前是空的。</div>'; return; }
    const searching = searchQuery.trim() !== '';
    const { buy, groups } = partition(items);
    if (buy.length) { const b = makeBlock('⚠️ 下次要買', { isBuy: true }); sortItems(buy).forEach(it => b.body.appendChild(makeRow(it, true))); list.appendChild(b.el); }
    const canCollapse = !searching && !isEditMode;
    orderedCategories(groups).forEach(cat => {
      const arr = sortItems(groups[cat]);
      const collapsed = canCollapse && collapsedCats.has(cat);
      const b = makeBlock(cat, { count: arr.length, collapsible: canCollapse, cat, collapsed });
      if (!collapsed) arr.forEach(it => b.body.appendChild(makeRow(it, false)));
      list.appendChild(b.el);
    });
  }

  function makeBlock(title, opts = {}) {
    const block = document.createElement('div'); block.className = 'category-block';
    const header = document.createElement('div');
    header.className = 'category-header' + (opts.isBuy ? ' buy' : '') + (opts.collapsible ? ' collapsible' : '');
    const t = document.createElement('span'); t.textContent = title;
    if (opts.count != null) { const c = document.createElement('span'); c.className = 'cat-count'; c.textContent = `（${opts.count}）`; t.appendChild(c); }
    header.appendChild(t);
    if (opts.collapsible) {
      const chev = document.createElement('span'); chev.className = 'material-symbols-rounded chev';
      chev.textContent = opts.collapsed ? 'chevron_right' : 'expand_more'; header.appendChild(chev);
      header.onclick = () => { if (collapsedCats.has(opts.cat)) collapsedCats.delete(opts.cat); else collapsedCats.add(opts.cat); saveCollapsed(); renderList(); };
    }
    block.appendChild(header);
    const body = document.createElement('div'); block.appendChild(body);
    return { el: block, body };
  }

  function makeRow(item, inBuy) { return isEditMode ? makeEditRow(item, inBuy) : makeDisplayRow(item, inBuy); }

  function makeDisplayRow(item, inBuy) {
    const row = document.createElement('div'); row.className = 'item-row';
    const info = document.createElement('div'); info.className = 'item-info';
    const name = document.createElement('div'); name.textContent = item.name;
    if (inBuy) { name.className = 'item-name'; info.appendChild(name); row.appendChild(info); return row; }
    name.className = 'item-name ' + expiryClass(item.expiry); info.appendChild(name);
    if (item.expiry) { const sub = document.createElement('div'); sub.className = 'item-sub ' + expiryClass(item.expiry); sub.textContent = '效期：' + formatDateDisplay(item.expiry); info.appendChild(sub); }
    row.appendChild(info);
    const qty = document.createElement('span'); qty.className = 'qty-display'; qty.textContent = item.qty; row.appendChild(qty);
    return row;
  }

  function makeEditRow(item, inBuy) {
    const draft = editDrafts[item.id];
    const row = document.createElement('div'); row.className = 'item-row editing';
    if (deleteSet.has(item.id)) row.classList.add('to-delete');
    const line1 = document.createElement('div'); line1.className = 'edit-line1';
    const name = document.createElement('div'); name.className = 'item-name ' + expiryClass(item.expiry); name.textContent = item.name;
    const del = document.createElement('button'); del.className = 'btn-delete'; del.textContent = deleteSet.has(item.id) ? '復原' : '刪除';
    del.onclick = () => { if (deleteSet.has(item.id)) deleteSet.delete(item.id); else deleteSet.add(item.id); row.classList.toggle('to-delete', deleteSet.has(item.id)); del.textContent = deleteSet.has(item.id) ? '復原' : '刪除'; };
    line1.appendChild(name); line1.appendChild(del); row.appendChild(line1);
    const line2 = document.createElement('div'); line2.className = 'edit-line2';
    const buyToggle = document.createElement('div'); buyToggle.className = 'buy-toggle';
    const cb = document.createElement('div'); cb.className = 'checkbox' + (draft.mustBuy ? ' checked' : '');
    const buyLabel = document.createElement('span'); buyLabel.className = 'buy-label'; buyLabel.textContent = '必買';
    buyToggle.appendChild(cb); buyToggle.appendChild(buyLabel);
    buyToggle.onclick = () => { draft.mustBuy = !draft.mustBuy; cb.classList.toggle('checked', draft.mustBuy); };
    line2.appendChild(buyToggle);
    const qf = document.createElement('div'); qf.className = 'edit-field';
    const ql = document.createElement('label'); ql.textContent = '庫存';
    const qi = document.createElement('input'); qi.type = 'text'; qi.className = 'edit-qty'; qi.value = draft.qty; qi.oninput = () => { draft.qty = qi.value; };
    qf.appendChild(ql); qf.appendChild(qi); line2.appendChild(qf);
    const ef = document.createElement('div'); ef.className = 'edit-field';
    const el = document.createElement('label'); el.textContent = '效期';
    const ei = document.createElement('input'); ei.type = 'date'; ei.className = 'edit-expiry'; ei.value = draft.expiry; ei.oninput = () => { draft.expiry = ei.value; };
    ef.appendChild(el); ef.appendChild(ei); line2.appendChild(ef);
    row.appendChild(line2); return row;
  }

  // ===== 搜尋 =====
  function toggleSearch() {
    closeAddForm(); closeHelp();
    const open = document.getElementById('searchBar').classList.toggle('open');
    document.getElementById('btnSearch').classList.toggle('active', open);
    if (open) document.getElementById('searchInput').focus();
    else { document.getElementById('searchInput').value = ''; if (searchQuery) { searchQuery = ''; renderList(); } }
  }
  function onSearch() { searchQuery = document.getElementById('searchInput').value; renderList(); }
  function clearSearch() { document.getElementById('searchInput').value = ''; searchQuery = ''; document.getElementById('searchInput').focus(); renderList(); }
  function closeSearch() { document.getElementById('searchBar').classList.remove('open'); document.getElementById('btnSearch').classList.remove('active'); document.getElementById('searchInput').value = ''; if (searchQuery) { searchQuery = ''; renderList(); } }

  // ===== 使用說明 =====
  function toggleHelp() { closeAddForm(); closeSearch(); const open = document.getElementById('helpCard').classList.toggle('open'); document.getElementById('btnHelp').classList.toggle('active', open); }
  function closeHelp() { document.getElementById('helpCard').classList.remove('open'); document.getElementById('btnHelp').classList.remove('active'); }

  // ===== 新增 =====
  function renderCategoryDropdown() {
    const sel = document.getElementById('inCategory'); sel.innerHTML = '<option value="">請選擇分類…</option>';
    allCategories.forEach(cat => { const o = document.createElement('option'); o.value = cat; o.textContent = cat; sel.appendChild(o); });
  }
  function openAddForm() {
    if (isEditMode) return; closeHelp(); closeSearch(); clearForm();
    const open = document.getElementById('formCard').classList.toggle('open');
    setBtnIcon('btnAdd', open ? 'close' : 'add'); document.getElementById('btnAdd').classList.toggle('active', open);
  }
  function closeAddForm() { document.getElementById('formCard').classList.remove('open'); setBtnIcon('btnAdd', 'add'); document.getElementById('btnAdd').classList.remove('active'); clearForm(); }
  function clearForm() {
    ['inName', 'inQty', 'inExpiry', 'inCategory'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inName').classList.remove('error'); document.getElementById('nameHint').textContent = ''; document.getElementById('btnSubmit').disabled = false;
  }
  function checkNameDuplicate() {
    const name = document.getElementById('inName').value.trim();
    const dup = name && allItems.some(it => it.name.trim().toLowerCase() === name.toLowerCase());
    document.getElementById('nameHint').textContent = dup ? '名稱已存在' : '';
    document.getElementById('inName').classList.toggle('error', !!dup);
    document.getElementById('btnSubmit').disabled = !!dup; return dup;
  }
  function submitNewItem() {
    if (isBusy) return;
    const name = document.getElementById('inName').value.trim();
    const qty = document.getElementById('inQty').value.trim();
    const expiry = document.getElementById('inExpiry').value;
    const category = document.getElementById('inCategory').value.trim();
    if (!name || qty === '' || !category) { alert('請填寫名稱、數量與分類。'); return; }
    if (checkNameDuplicate()) { alert('名稱已存在，請換一個名稱。'); return; }
    isBusy = true; const btn = document.getElementById('btnSubmit'); btn.disabled = true; btn.textContent = '新增中…';
    apiPost({ action: 'save', data: { name, qty, category, expiry } })
      .then(res => { if (!res || res.auth === false) return; if (res.status === 'success') { closeAddForm(); loadInventory(); } else alert('新增失敗：' + (res.message || '未知錯誤')); })
      .catch(err => alert('新增連線失敗：' + err.toString()))
      .finally(() => { isBusy = false; btn.disabled = false; btn.textContent = '確認新增'; });
  }

  // ===== 編輯 / 更新 / 取消 =====
  function toggleEditMode() { if (isEditMode) cancelEdit(); else enterEditMode(); }
  function enterEditMode() {
    closeAddForm(); closeHelp(); isEditMode = true; deleteSet.clear(); editDrafts = {};
    allItems.forEach(it => { editDrafts[it.id] = { qty: it.qty, expiry: it.expiry, mustBuy: it.mustBuy }; });
    document.getElementById('btnAdd').classList.add('hidden');
    document.getElementById('btnUpdate').classList.remove('hidden');
    document.getElementById('btnCopy').disabled = true;
    setBtnIcon('btnEdit', 'close'); document.getElementById('btnEdit').classList.add('active'); renderList();
  }
  function exitEditModeUI() {
    isEditMode = false; editDrafts = {}; deleteSet.clear();
    document.getElementById('btnAdd').classList.remove('hidden');
    document.getElementById('btnUpdate').classList.add('hidden');
    document.getElementById('btnCopy').disabled = false;
    setBtnIcon('btnEdit', 'edit'); document.getElementById('btnEdit').classList.remove('active');
  }
  function cancelEdit() { exitEditModeUI(); renderList(); }
  function commitEdit() {
    if (isBusy) return;
    const updates = [];
    allItems.forEach(it => { if (deleteSet.has(it.id)) return; const d = editDrafts[it.id];
      if (d.qty !== it.qty || d.expiry !== it.expiry || d.mustBuy !== it.mustBuy) updates.push({ id: it.id, qty: d.qty, expiry: d.expiry, mustBuy: d.mustBuy }); });
    const deletes = [...deleteSet];
    if (!updates.length && !deletes.length) { cancelEdit(); return; }
    if (deletes.length) {
      const names = deletes.map(id => { const f = allItems.find(it => String(it.id) === String(id)); return '・' + (f ? f.name : id); });
      if (!confirm(`確定要刪除這 ${deletes.length} 筆嗎？此動作無法復原。\n\n${names.join('\n')}`)) return;
    }
    isBusy = true; const btn = document.getElementById('btnUpdate'); btn.disabled = true; showStatus('儲存中…');
    apiPost({ action: 'commit', updates, deletes })
      .then(res => {
        if (!res || res.auth === false) return;
        if (res.status === 'success') {
          const failNames = (res.failedItems || []).map(id => { const f = allItems.find(it => String(it.id) === String(id)); return f ? f.name : id; });
          alert(res.failed > 0 ? `更新完成：成功 ${res.updated} 筆，失敗 ${res.failed} 筆（${failNames.join('、')}）` : `更新完成：成功 ${res.updated} 筆`);
          exitEditModeUI(); loadInventory();
        } else { hideStatus(); alert('更新失敗：' + (res.message || '未知錯誤')); }
      })
      .catch(err => { hideStatus(); alert('更新連線失敗：' + err.toString()); })
      .finally(() => { isBusy = false; btn.disabled = false; });
  }

  // ===== 複製 =====
  function copyList() {
    if (isEditMode || !allItems.length) return;
    const { buy, groups } = partition(allItems);
    let out = todayTitle() + '\n\n';
    if (buy.length) { out += '⚠️ 下次要買：\n'; sortItems(buy).forEach(it => { out += it.name + '\n'; }); out += '\n'; }
    orderedCategories(groups).forEach(cat => {
      out += '🔹 ' + cat + '：\n';
      sortItems(groups[cat]).forEach(it => { const c = expiryClass(it.expiry); const mark = c === 'expiry-soon' ? ' ❗️' : c === 'expiry-expired' ? ' 💩' : ''; out += it.name + ' ' + it.qty + mark + '\n'; });
      out += '\n';
    });
    out = out.trim();
    navigator.clipboard.writeText(out).then(() => alert(`📋 已複製「${todayTitle()}」`)).catch(() => alert('複製失敗，請手動全選複製。'));
  }
</script>
