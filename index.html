<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <style>
    :root { --bg-main: #ffffff; --text-main: #000000; --text-muted: #8e8e93; --text-dim: #636366; --border-thin: #e5e5ea; --accent-orange: #ff9500; --accent-red: #ff3b30; --bg-input: #f2f2f7; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 0; margin: 0; overflow: hidden; }
    .container { width: 100%; max-width: 420px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .sticky-top-panel { position: sticky; top: 0; background: var(--bg-main); z-index: 100; padding: 16px 16px 12px 16px; border-bottom: 1px solid #f2f2f7; }
    header { display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 19px; font-weight: 700; margin: 0; }
    .header-ops { display: flex; gap: 5px; }
    .btn-base { height: 30px; padding: 0 10px; font-size: 13px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
    .btn-submit-all { background: var(--accent-orange); color: white; display: none; } /* 批次送出按鈕 */
    .btn-add { background: #1c1c1e; color: #ffffff; }
    .btn-edit { background: #f2f2f7; color: var(--text-main); }
    .btn-edit.active { background: #007aff; color: #ffffff; }
    .scroll-content { flex-grow: 1; overflow-y: auto; padding: 0 16px 40px 16px; }
    .item-row { padding: 12px 4px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f7; }
    .qty-text { font-size: 14px; color: var(--text-dim); } /* 純文字顯示 */
    .inline-qty-input { width: 60px; height: 30px; border: 1px solid var(--border-thin); border-radius: 4px; text-align: center; }
    .inline-expiry-input { width: 95px; height: 30px; border: 1px solid var(--border-thin); border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <h1>PocketStock</h1>
      <div class="header-ops">
        <button class="btn-base btn-submit-all" id="submitAllBtn" onclick="submitAllChanges()">送出變更</button>
        <button class="btn-base btn-add" id="toggleAddBtn" onclick="openAddForm()">Add</button>
        <button class="btn-base btn-edit" id="toggleEditBtn" onclick="toggleEditMode()">Edit</button>
      </div>
    </header>
  </div>

  <div class="scroll-content">
    <div id="statusInfo" class="status-text">Loading...</div>
    <div id="inventoryList"></div>
  </div>
</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec";
  let globalData = [];
  let isEditMode = false;

  // 頁面載入
  document.addEventListener("DOMContentLoaded", fetchInventory);

  function fetchInventory() {
    fetch(GAS_WEB_APP_URL).then(res => res.json()).then(res => {
      globalData = res.data;
      renderList();
      document.getElementById("statusInfo").style.display = "none";
    });
  }

  function toggleEditMode() {
    isEditMode = !isEditMode;
    const btn = document.getElementById("toggleEditBtn");
    const subBtn = document.getElementById("submitAllBtn");
    
    btn.innerText = isEditMode ? "關閉" : "Edit";
    btn.className = isEditMode ? "btn-base btn-edit active" : "btn-base btn-edit";
    subBtn.style.display = isEditMode ? "inline-block" : "none";
    
    renderList();
  }

  function renderList() {
    const list = document.getElementById("inventoryList");
    list.innerHTML = "";
    globalData.forEach(item => {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <div>
          <div style="font-size: 15px;">${item['名稱']}</div>
          <div style="font-size: 11px; color: #8e8e93;">${item['有效日期'] || ''}</div>
        </div>
        <div class="right-meta">
          ${isEditMode ? 
            `<input type="text" class="inline-qty-input" value="${item['庫存量']}" data-id="${item['ID']}">` : 
            `<span class="qty-text">${item['庫存量']}</span>`
          }
        </div>
      `;
      list.appendChild(row);
    });
  }

  function submitAllChanges() {
    const inputs = document.querySelectorAll('.inline-qty-input');
    const updates = Array.from(inputs).map(input => ({
      id: input.dataset.id,
      qty: input.value
    }));

    document.getElementById("statusInfo").innerText = "批次更新中...";
    document.getElementById("statusInfo").style.display = "block";

    // 這裡建議你可以將所有更新一次性發送，或是迴圈發送
    // 為了簡單穩定，我們這裡迴圈執行 save
    Promise.all(updates.map(u => 
      fetch(GAS_WEB_APP_URL, {
        method: "POST", 
        body: JSON.stringify({ action: "save", data: { id: u.id, qty: u.qty } })
      })
    )).then(() => {
      alert("更新成功");
      toggleEditMode();
      fetchInventory();
    });
  }
</script>
</body>
</html>
