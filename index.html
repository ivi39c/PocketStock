<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock</title>
  <style>
    :root {
      --bg-main: #ffffff;
      --text-main: #000000;
      --text-muted: #8e8e93;
      --text-dim: #636366;
      --border-thin: #e5e5ea;
      --accent-red: #ff3b30;
      --accent-purple: #af52de;
      --bg-input: #f2f2f7;
      --bg-dark: #1c1c1e;
    }

    /* 全域設定：確保 box-sizing 為 border-box */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 0; }
    .container { width: 100%; max-width: 420px; margin: 0 auto; overflow-x: hidden; }
    
    /* 修正卡片與表單寬度 */
    .form-card { 
      background: #fbfbfa; padding: 20px; border-radius: 12px; border: 1px solid var(--border-thin); 
      margin-top: 12px; display: none; overflow: hidden; width: 100%; 
    }
    .form-card.open { display: block; }
    
    .form-group { margin-bottom: 12px; width: 100%; }
    .form-control { 
      width: 100%; height: 42px; padding: 0 12px; background: var(--bg-input); 
      border: 1px solid var(--border-thin); border-radius: 6px; font-size: 14px; 
      color: var(--text-main); box-sizing: border-box; display: block;
    }

    /* 關鍵修正：針對 iOS 的日期輸入框 */
    input[type="date"]#inExpiry {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      padding: 0 12px !important;
      box-sizing: border-box !important;
      -webkit-appearance: none;
      appearance: none;
      display: block;
    }

    /* 其他既有樣式 */
    .sticky-top-panel { position: sticky; top: 0; background: var(--bg-main); z-index: 100; padding: 16px; border-bottom: 1px solid #f2f2f7; }
    header { display: flex; justify-content: space-between; align-items: center; }
    .btn-add { background: var(--bg-dark); color: #fff; height: 34px; width: 38px; border-radius: 8px; border: none; cursor: pointer; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="sticky-top-panel">
    <header>
      <h1>PocketStock</h1>
      <button class="btn-add" id="btnAdd" onclick="toggleAddForm()">+</button>
    </header>

    <div class="form-card" id="formCard">
      <div class="form-group">
        <label>有效期限（選填）</label>
        <input type="date" id="inExpiry" class="form-control">
      </div>
      <button type="button" class="btn-submit" onclick="submitNewItem()">確認新增</button>
    </div>
  </div>
</div>

<script>
  function toggleAddForm() {
    const card = document.getElementById('formCard');
    card.classList.toggle('open');
  }
  function submitNewItem() { alert('新增成功'); }
</script>
</body>
</html>
