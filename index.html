<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PocketStock // Minimal</title>
  <style>
    :root {
      --bg-main: #000000;
      --bg-input: #121214;
      --text-main: #ffffff;
      --text-muted: #666666;
      --text-dim: #999999;
      --accent-danger: #ff3b30;
      --border-thin: #1c1c1e;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
      background: var(--bg-main); 
      color: var(--text-main); 
      padding: 20px 16px; 
      margin: 0;
      overflow-x: hidden; 
    }
    
    .container { width: 100%; max-width: 420px; margin: 0 auto; }
    
    /* 極簡無邊框頂欄 */
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-thin);
    }
    header h1 { font-size: 16px; font-weight: 600; margin: 0; color: var(--text-main); }
    .header-ops { display: flex; gap: 10px; }
    
    /* 輕量級純文字感按鈕 */
    .btn-action { 
      height: 32px; 
      padding: 0 10px; 
      font-size: 12px; 
      font-weight: 500; 
      border-radius: 6px; 
      border: null;
      cursor: pointer; 
      background: #1c1c1e;
      color: var(--text-main);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-add-mode { background: var(--text-main); color: var(--bg-main); font-weight: 600; }
    .btn-edit-mode.active { background: var(--accent-danger); color: white; }
    .btn-refresh { background: transparent; color: var(--text-muted); font-size: 14px; }

    /* 乾淨複製列 */
    .btn-share { 
      width: 100%; 
      height: 40px; 
      border: 1px solid var(--border-thin); 
      border-radius: 6px; 
      font-size: 12px; 
      font-weight: 500; 
      cursor: pointer; 
      color: var(--text-dim); 
      background: transparent;
      margin-bottom: 24px; 
    }

    /* 懶人快速輸入面板 */
    .form-card { 
      background: #0a0a0c; 
      padding: 16px; 
      border-radius: 8px; 
      border: 1px solid var(--border-thin);
      margin-bottom: 24px; 
      display: none; 
    }
    .card-title { font-size: 11px; font-weight: 600; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-close-form { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; margin-bottom: 6px; color: var(--text-muted); }
    .form-control { width: 100%; height: 36px; padding: 0 10px; background: var(--bg-input); border: 1px solid var(--border-thin); border-radius: 4px; font-size: 13px; color: white; box-sizing: border-box; }
    .form-control:focus { outline: none; border-color: #444; }
    
    .form-checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
    .form-checkbox-group label { margin: 0; color: var(--text-dim); font-size: 12px; cursor: pointer; }

    .btn-submit { width: 100%; height: 38px; background: var(--text-main); color: var(--bg-main); border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 6px; }

    /* 極簡記帳風格清單：無外殼，純大膽留白 */
    .category-block {
      margin-bottom: 24px;
    }
    
    .category-header {
      padding: 0 4px 8px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-thin);
    }
    .category-header.need-to-buy-header {
      color: var(--accent-danger);
    }
    
    /* 橫列設計：放大右側點擊熱區 */
    .item-row { 
      padding: 12px 4px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #121212;
    }
    
    /* 數量為 0 時自動半透明，極易閱讀 */
    .item-name { 
      font-size: 14px; 
      font-weight: 400; 
      color: #f1f1f1; 
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.2s ease;
    }
    .item-name.is-empty {
      opacity: 0.35; /* 視覺消退 */
    }
    
    /* 右側點擊熱區：點擊整個區塊都能勾選必買 */
    .right-meta { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      flex-shrink: 0; 
      padding-left: 30px; /* 擴大觸控寬度 */
      cursor: pointer;
    }
    
    .item-qty { font-size: 13px; font-weight: 500; color: var(--text-dim); }
    .item-qty.highlight-red { color: var(--accent-danger); }
    
    /* iOS 風格極簡 Checkbox */
    .box-check {
      width: 16px;
      height: 16px;
      background-color: transparent;
      border: 1px solid #3a3a3c;
      border-radius: 50%; /* 圓形更像記帳/待辦 App */
      position: relative;
      transition: all 0.1s ease;
    }
    .box-check.checked {
      background-color: var(--text-main);
      border-color: var(--text-main);
    }
    .box-check.checked::after {
      content: '';
      position: absolute;
      width: 3px;
      height: 6px;
      border: solid var(--bg-main);
      border-width: 0 1.5px 1.5px 0;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    /* 編輯動作按鈕 */
    .edit-actions { display: none; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-sm { height: 24px; padding: 0 8px; font-size: 11px; border-radius: 4px; color: var(--text-dim); background: #1c1c1e; border: null; cursor: pointer; }
    .btn-delete { color: var(--accent-danger); background: rgba(255, 59, 48, 0.05); }
    
    .status-text { text-align: center; color: var(--text-muted); font-size: 12px; padding: 40px; letter-spacing: 0.5px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>PocketStock</h1>
    <div class="header-ops">
      <button class="btn-action btn-add-mode" onclick="openAddForm()">＋ Add</button>
      <button class="btn-action btn-edit-mode" id="toggleEditBtn" onclick="toggleEditMode()">Edit</button>
      <button class="btn-action btn-refresh" onclick="fetchInventory()">🔄</button>
    </div>
  </header>

  <button class="btn-share" onclick="copyToClipboard()">📄 Copy for LINE (Plain Text)</button>

  <!-- 表單面板 -->
  <div class="form-card" id="formCard">
    <div class="card-title">
      <span id="form-title">Item Console</span>
      <button class="btn-close-form" onclick="closeForm()">✕</button>
    </div>
    <input type="hidden" id="itemId">
    <div class="form-group">
      <label>項目名稱</label>
      <input type="text" id="itemName" class="form-control" placeholder="例：雞蛋">
    </div>
    <div class="form-group">
      <label>數量單位</label>
      <input type="text" id="itemQty" class="form-control" placeholder="例：0、2包">
    </div>
    <div class="form-checkbox-group">
      <div class="box-check" id="formBuyCheck" onclick="this.classList.toggle('checked')"></div>
      <label onclick="document.getElementById('formBuyCheck').classList.toggle('checked')">標記為下次必買</label>
    </div>
    <div class="form-group">
      <label>分類</label>
      <input type="text" id="itemCategory" class="form-control" placeholder="例：冷藏、乾貨">
    </div>
    <div class="form-group" style="display:none;"> <!-- 隱藏不常用欄位，保持乾淨 -->
      <label>有效期限</label>
      <input type="date" id="itemExpiry" class="form-control">
    </div>
    <button type="button" id="btnSubmit" class="btn-submit" onclick="saveItem()">儲存更新</button>
  </div>

  <!-- 主頁清單區 -->
  <div>
    <div id="statusInfo" class="status-text">Loading...</div>
    <div id="inventoryList"></div>
  </div>
</div>

<script>
  // 自動精準綁定你的網址
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNjYRw4t6aWZmdxuQzT2HNjwgF-GUvxtsYfi49GM_2cM31fEXOoDMn8ZQ4l4ExsiZS2A/exec"; 
  
  let globalData = [];
  let isEditModeActive = false;

  function checkIsMustBuy(qtyStr) {
    return String(qtyStr).includes("(必買)");
  }

  function getCleanQty(qtyStr) {
    return String(qtyStr).replace("(必買)", "").trim();
  }

  document.addEventListener("DOMContentLoaded", fetchInventory);

  function fetchInventory() {
    const status = document.getElementById("statusInfo");
    status.style.display = "block";
    status.innerText = "Loading data...";
    document.getElementById("inventoryList").innerHTML = "";

    fetch(GAS_WEB_APP_URL)
      .then(res => res.json())
      .then(res => {
        status.style.display = "none";
        if (res.status === "success") {
          globalData = res.data;
          renderList(globalData);
        } else {
          status.innerText = "Error loading data.";
        }
      })
      .catch(err => {
        status.innerText = "Connection failed.";
      });
  }

  function renderList(items) {
    const list = document.getElementById("inventoryList");
    if (items.length === 0) {
      list.innerHTML = '<div class="status-text">清單目前是空的。</div>';
      return;
    }

    const needToBuyItems = [];
    const normalGroups = {};

    items.forEach(item => {
      const rawQty = item['庫存量'] || '';
      if (checkIsMustBuy(rawQty)) {
        needToBuyItems.push(item);
      } else {
        const cat = item['分類'] || "未分類";
        if (!normalGroups[cat]) normalGroups[cat] = [];
        normalGroups[cat].push(item);
      }
    });

    // 置頂區：⚠️ 下次要買
    if (needToBuyItems.length > 0) {
      const buyBlock = document.createElement("div");
      buyBlock.className = "category-block";
      
      const buyHeader = document.createElement("div");
      buyHeader.className = "category-header need-to-buy-header";
      buyHeader.innerText = "⚠️ 下次要買";
      buyBlock.appendChild(buyHeader);

      needToBuyItems.forEach(item => {
        buyBlock.appendChild(createItemRow(item, true));
      });
      list.appendChild(buyBlock);
    }

    // 常規分類區
    for (const category in normalGroups) {
      const catBlock = document.createElement("div");
      catBlock.className = "category-block";
      
      const catHeader = document.createElement("div");
      catHeader.className = "category-header";
      catHeader.innerText = category;
      catBlock.appendChild(catHeader);

      normalGroups[category].forEach(item => {
        catBlock.appendChild(createItemRow(item, false));
      });

      list.appendChild(catBlock);
    }
  }

  function createItemRow(item, isChecked) {
    const itemRow = document.createElement("div");
    itemRow.className = "item-row";
    
    const cleanQty = getCleanQty(item['庫存量']);
    const isZero = (cleanQty === "0" || cleanQty === "");

    itemRow.innerHTML = `
      <!-- 如果數量是 0，名字自動套用 is-empty 變半透明 -->
      <div class="item-name ${isZero ? 'is-empty' : ''}">${item['名稱'] || '未命名'}</div>
      
      <!-- 點擊右側這整個區塊都能直接切換必買，熱區極大 -->
      <div class="right-meta" id="right-meta-${item['ID']}" style="display: ${isEditModeActive ? 'none' : 'flex'}" onclick="toggleQuickBuy('${item['ID']}', ${isChecked})">
        <span class="item-qty ${isZero ? 'highlight-red' : ''}">${cleanQty}</span>
        <div class="box-check ${isChecked ? 'checked' : ''}"></div>
      </div>
      
      <div class="edit-actions" id="edit-actions-${item['ID']}" style="display: ${isEditModeActive ? 'flex' : 'none'}">
        <button class="btn-sm" onclick="startEditItem('${item['ID']}', '${item['名稱']}', '${item['庫存量']}', '${item['分類']}', '${item['有效期限']}')">編輯</button>
        <button class="btn-sm btn-delete" onclick="deleteItem('${item['ID']}', '${item['名稱']}')">刪除</button>
      </div>
    `;
    return itemRow;
  }

  function toggleQuickBuy(id, currentChecked) {
    const targetItem = globalData.find(item => String(item['ID']) === String(id));
    if (!targetItem) return;

    let cleanQty = getCleanQty(targetItem['庫存量']);
    let newQty = currentChecked ? cleanQty : `${cleanQty} (必買)`;

    document.getElementById("statusInfo").style.display = "block";
    document.getElementById("statusInfo").innerText = "Saving...";

    const payload = {
      action: "save",
      data: { 
        id: targetItem['ID'], 
        name: targetItem['名稱'], 
        qty: newQty, 
        category: targetItem['分類'], 
        expiry: targetItem['有效期限'] 
      }
    };

    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(res => {
      if (res.status === "success") {
        fetchInventory();
      }
    })
    .catch(err => alert("連線失敗"));
  }

  function toggleEditMode() {
    isEditModeActive = !isEditModeActive;
    const btn = document.getElementById("toggleEditBtn");
    if (isEditModeActive) {
      btn.innerText = "✕ 關閉";
      btn.classList.add("active");
    } else {
      btn.innerText = "Edit";
      btn.classList.remove("active");
    }
    renderList(globalData);
  }

  function openAddForm() {
    clearForm();
    document.getElementById("form-title").innerText = "新增品項";
    document.getElementById("formCard").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function startEditItem(id, name, rawQty, category, expiry) {
    document.getElementById("itemId").value = id;
    document.getElementById("itemName").value = name;
    document.getElementById("itemQty").value = getCleanQty(rawQty);
    
    if (checkIsMustBuy(rawQty)) {
      document.getElementById("formBuyCheck").classList.add("checked");
    } else {
      document.getElementById("formBuyCheck").classList.remove("checked");
    }
    
    document.getElementById("itemCategory").value = category;
    document.getElementById("itemExpiry").value = expiry === "undefined" || expiry === "null" ? "" : expiry;
    
    document.getElementById("form-title").innerText = "編輯項目 ID: " + id;
    document.getElementById("formCard").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closeForm() {
    document.getElementById("formCard").style.display = "none";
    clearForm();
  }

  function saveItem() {
    const id = document.getElementById("itemId").value.trim();
    const name = document.getElementById("itemName").value.trim();
    let qty = document.getElementById("itemQty").value.trim();
    const isChecked = document.getElementById("formBuyCheck").classList.contains("checked");
    const category = document.getElementById("itemCategory").value.trim();
    const expiry = document.getElementById("itemExpiry").value;

    if (!name || qty === "" || !category) {
      alert("請填寫名稱、數量與分類。");
      return;
    }

    if (isChecked) qty = `${qty} (必買)`;

    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.innerText = "儲存中...";

    const payload = {
      action: "save",
      data: { id: id, name: name, qty: qty, category: category, expiry: expiry }
    };

    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(res => {
      btn.disabled = false;
      btn.innerText = "儲存更新";
      if (res.status === "success") {
        closeForm();
        if (isEditModeActive) toggleEditMode();
        fetchInventory();
      }
    })
    .catch(err => {
      btn.disabled = false;
    });
  }

  function deleteItem(id, name) {
    if (!confirm(`確認刪除「${name}」？`)) return;
    document.getElementById("statusInfo").style.display = "block";
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "delete", data: { id: id } })
    })
    .then(res => res.json())
    .then(res => { if (res.status === "success") fetchInventory(); })
    .catch(err => alert("刪除失敗"));
  }

  function copyToClipboard() {
    if (globalData.length === 0) return;

    let needToBuyText = `⚠️ 下次要買：\n`;
    let hasStockText = ``;
    let hasNeedToBuy = false;
    const normalGroups = {};

    globalData.forEach(item => {
      const rawQty = item['庫存量'] || '';
      if (checkIsMustBuy(rawQty)) {
        needToBuyText += `${item['名稱']} ${getCleanQty(rawQty)}\n`;
        hasNeedToBuy = true;
      } else {
        const cat = item['分類'] || "未分類";
        if (!normalGroups[cat]) normalGroups[cat] = [];
        normalGroups[cat].push(item);
      }
    });

    for (const category in normalGroups) {
      let categoryContent = ``;
      normalGroups[category].forEach(item => {
        categoryContent += `${item['名稱']} ${item['庫存量']}\n`;
      });
      if (categoryContent !== ``) {
        hasStockText += `${category}：\n${categoryContent}\n`;
      }
    }

    let finalOutput = ``;
    if (hasNeedToBuy) finalOutput += needToBuyText + `\n`;
    finalOutput += hasStockText;
    finalOutput = finalOutput.trim();

    const textarea = document.createElement("textarea");
    textarea.value = finalOutput;
    textarea.style.position = "fixed";
    document.body.appendChild(textarea);
    textarea.select();

    try {
      document.execCommand("copy");
      alert("📋 已複製純文字採購單！");
    } catch (err) {}
    document.body.removeChild(textarea);
  }

  function clearForm() {
    document.getElementById("itemId").value = "";
    document.getElementById("itemName").value = "";
    document.getElementById("itemQty").value = "";
    document.getElementById("formBuyCheck").classList.remove("checked");
    document.getElementById("itemCategory").value = "";
    document.getElementById("itemExpiry").value = "";
  }
</script>
</body>
</html>
